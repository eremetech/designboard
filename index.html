    { name: "Geometric Pattern BG", aka: "Abstract shapes, Poly background", css: `<svg width="80" height="50" viewBox="0 0 80 50"><rect width="80" height="50" rx="8" fill="#f5f7ff"/><polygon points="0,50 30,20 60,50" fill="rgba(124,92,252,0.10)" stroke="rgba(124,92,252,0.20)" stroke-width="0.5"/><polygon points="20,0 50,30 80,0" fill="rgba(252,92,140,0.06)" stroke="rgba(252,92,140,0.14)" stroke-width="0.5"/><polygon points="60,50 80,20 80,50" fill="rgba(92,252,182,0.07)" stroke="rgba(92,252,182,0.14)" stroke-width="0.5"/></svg>`, prompt: `Create a geometric pattern background — low-poly triangles, overlapping shapes, or tessellated patterns at very low opacity. Use for tech-forward designs, conference sites, or corporate pages. Keep opacity below 10% so it adds texture without competing with content.` },
    { name: "Noise Overlay Background", aka: "Film grain BG, Textured dark", css: `<div style="width:80px;height:50px;border-radius:8px;background:#f3f4f6;position:relative;overflow:hidden"><svg width="100%" height="100%" style="position:absolute;inset:0"><filter id="bgNoise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#bgNoise)" opacity="0.32" style="mix-blend-mode:multiply" fill="#000"/></svg><div style="position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06)"></div></div>`, prompt: `Add a subtle noise texture overlay to a solid or gradient background. Use SVG feTurbulence at 3-5% opacity. Prevents the "too clean" digital look, adds depth and subtle texture. Works on both light and dark backgrounds. Almost invisible but makes a subconscious difference.` },
    { name: "Gradient Wave Divider", aka: "Section separator, Curve divider", css: `<div style="width:80px;height:50px;position:relative;border-radius:8px;overflow:hidden"><div style="position:absolute;top:0;width:100%;height:50%;background:#7c5cfc"></div><svg style="position:absolute;top:40%;width:100%" viewBox="0 0 80 20" preserveAspectRatio="none"><path d="M0,10 Q20,0 40,10 Q60,20 80,10 L80,20 L0,20 Z" fill="#1a1a24"/></svg><div style="position:absolute;bottom:0;width:100%;height:40%;background:#1a1a24"></div></div>`, prompt: `Create a wave-shaped section divider — an SVG curve between two sections of different colors. Use preserveAspectRatio="none" to stretch across the viewport. Creates organic, flowing transitions instead of hard horizontal lines. Popular for landing pages between hero and content sections.` },
    { name: "Diagonal Section", aka: "Angled divider, Skewed section", css: `<div style="width:80px;height:50px;position:relative;border-radius:8px;overflow:hidden"><div style="position:absolute;top:0;width:100%;height:60%;background:#7c5cfc;transform:skewY(-5deg);transform-origin:top left"></div><div style="position:absolute;bottom:0;width:100%;height:55%;background:#1a1a24"></div></div>`, prompt: `Create a diagonal/angled section divider — a skewed boundary between two sections. Use CSS transform: skewY(-3deg to -6deg) or an SVG diagonal line. Creates dynamic energy and forward momentum. Use for landing pages, pricing sections, or feature areas that need visual drama.` },
    { name: "Synthwave / Retro Grid", aka: "Vaporwave, 80s grid", css: `<div style="width:80px;height:50px;border-radius:8px;overflow:hidden;background:linear-gradient(180deg,#fee2ff 0%,#e0f2fe 40%,#fee2e2 100%);position:relative"><div style="position:absolute;bottom:0;width:100%;height:50%;background:linear-gradient(180deg,transparent,rgba(124,92,252,0.18));background-size:10px 10px;background-image:linear-gradient(rgba(124,92,252,0.4) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.4) 1px,transparent 1px);transform:perspective(100px) rotateX(30deg);transform-origin:bottom"></div><div style="position:absolute;top:12px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#fb923c;border-radius:50%;box-shadow:0 0 10px rgba(251,146,60,0.9)"></div></div>`, prompt: `Create a synthwave/retrowave background — sky gradient, perspective grid floor receding to the horizon, neon sun (circle with glow), and optional mountain silhouettes. Use CSS perspective transform on the grid. Captures 1980s sci-fi/arcade nostalgia. Works on both light and dark palettes.` },
    { name: "Bokeh Background", aka: "Out-of-focus lights, Lens blur circles", css: `<div style="width:80px;height:50px;border-radius:8px;background:#fefce8;position:relative;overflow:hidden"><div style="position:absolute;top:8px;left:12px;width:16px;height:16px;background:rgba(124,92,252,0.25);border-radius:50%"></div><div style="position:absolute;top:20px;left:40px;width:10px;height:10px;background:rgba(252,92,140,0.20);border-radius:50%"></div><div style="position:absolute;top:12px;left:60px;width:14px;height:14px;background:rgba(252,172,92,0.24);border-radius:50%"></div><div style="position:absolute;top:30px;left:20px;width:12px;height:12px;background:rgba(92,252,182,0.18);border-radius:50%"></div><div style="position:absolute;top:28px;left:55px;width:8px;height:8px;background:rgba(124,92,252,0.28);border-radius:50%"></div></div>`, prompt: `Create a bokeh background — soft, out-of-focus circles of light in various sizes and colors, simulating a camera's shallow depth-of-field. Use semi-transparent circles on a light or dark background. Animate with gentle floating motion. Use for festive themes, photography sites, or dreamy hero backgrounds.` },
    { name: "Layered Mountains", aka: "Parallax hills, Valley silhouette", css: `<svg width="80" height="50" viewBox="0 0 80 50"><rect width="80" height="50" fill="#e0f2fe"/><path d="M0,45 Q15,30 30,38 Q45,20 60,32 Q75,28 80,35 L80,50 L0,50 Z" fill="#bfdbfe"/><path d="M0,48 Q20,35 40,42 Q55,30 70,38 Q80,34 80,42 L80,50 L0,50 Z" fill="#93c5fd"/><path d="M0,50 Q25,40 50,46 Q65,38 80,44 L80,50 Z" fill="#60a5fa"/></svg>`, prompt: `Create layered mountain/hill silhouettes — overlapping wave-like shapes in progressively lighter or darker shades from back to front. Creates depth through atmospheric perspective. Use for nature-themed designs, outdoor brands, or as a decorative footer/section background. Animate layers at different scroll speeds for parallax.` },
    { name: "Animated Particles", aka: "Floating dots, Dust motes", css: `<div style="width:80px;height:50px;border-radius:8px;background:#f3f4f6;position:relative;overflow:hidden"><div style="position:absolute;top:10px;left:15px;width:3px;height:3px;background:#7c5cfc;border-radius:50%;animation:floatP 4s ease-in-out infinite"></div><div style="position:absolute;top:30px;left:45px;width:2.5px;height:2.5px;background:#fc5c8c;border-radius:50%;animation:floatP 5s ease-in-out 1s infinite"></div><div style="position:absolute;top:18px;left:65px;width:3px;height:3px;background:#5cfcb6;border-radius:50%;animation:floatP 6s ease-in-out 2s infinite"></div><div style="position:absolute;top:38px;left:25px;width:2px;height:2px;background:#fcac5c;border-radius:50%;animation:floatP 4.5s ease-in-out 0.5s infinite"></div></div><style>@keyframes floatP{0%,100%{transform:translate(0,0);opacity:0.6}25%{transform:translate(4px,-6px);opacity:1}75%{transform:translate(-3px,4px);opacity:0.8}}</style>`, prompt: `Create animated floating particles — small dots of varying sizes and colors that drift slowly across a dark background. Use CSS animation or a JS particle library (particles.js, tsparticles). Particles can connect with thin lines when near each other. Use for tech/AI themes, hero backgrounds, or cosmic aesthetics.` }
  ]
},

// ─── DARK MODE PATTERNS ───
{
  section: "Dark Mode Patterns",
  desc: "Specific design techniques and considerations for dark-themed interfaces.",
  items: [
    { name: "Elevation via Lightness", aka: "Surface tinting, Z-axis brightness", css: `<div style="display:flex;gap:3px;align-items:end"><div style="width:18px;height:40px;background:#0a0a0f;border-radius:3px;font-size:6px;color:#444;text-align:center;padding-top:2px">dp0</div><div style="width:18px;height:40px;background:#121218;border-radius:3px;font-size:6px;color:#444;text-align:center;padding-top:2px">dp1</div><div style="width:18px;height:40px;background:#1a1a22;border-radius:3px;font-size:6px;color:#444;text-align:center;padding-top:2px">dp2</div><div style="width:18px;height:40px;background:#24242e;border-radius:3px;font-size:6px;color:#444;text-align:center;padding-top:2px">dp4</div></div>`, prompt: `In dark mode, express elevation through surface lightness — higher-elevation surfaces are slightly lighter, not shadowed. Base surface (dp0) is darkest; each elevation level adds ~2-4% white overlay. Shadows are less visible in dark mode, so lightness differences become the primary depth cue.` },
    { name: "Desaturated Colors", aka: "Muted dark palette, Toned-down", css: `<div style="display:flex;gap:3px"><div style="width:18px;height:36px;background:#5c8cfc;border-radius:4px"></div><div style="width:18px;height:36px;background:#fc7cac;border-radius:4px"></div><div style="width:18px;height:36px;background:#4ccca0;border-radius:4px"></div></div>`, prompt: `In dark mode, desaturate and lighten brand colors — fully saturated colors vibrate against dark backgrounds and cause eye strain. Reduce saturation by 10-20% and increase lightness. Maintain enough contrast (WCAG 4.5:1 min). Pastels work better against dark than against white.` },
    { name: "Subtle Borders", aka: "Edge definition, Divider lines", css: `<div style="width:60px;height:40px;background:#13131a;border:1px solid rgba(255,255,255,0.06);border-radius:8px"></div>`, prompt: `In dark mode, use very subtle borders (white at 5-10% opacity) to define edges between same-shade surfaces. Borders are more important in dark mode because shadows are less visible. Use rgba(255,255,255,0.06-0.12) instead of solid gray colors for more natural blending.` },
    { name: "Glow Accents", aka: "Luminous highlights, Light emission", css: `<div style="width:60px;height:40px;background:#13131a;border-radius:8px;display:flex;align-items:center;justify-content:center"><div style="width:30px;height:6px;background:#7c5cfc;border-radius:3px;box-shadow:0 0 8px rgba(124,92,252,0.4),0 0 20px rgba(124,92,252,0.15)"></div></div>`, prompt: `In dark mode, accent elements can emit glow — use colored box-shadow to create light-emission effects impossible on white backgrounds. Colored elements appear to be light sources. Use for active states, selected items, or CTAs. This is a dark-mode superpower.` },
    { name: "Dark Hero Gradient", aka: "Ambient hero, Moody gradient", css: `<div style="width:80px;height:50px;border-radius:8px;background:linear-gradient(180deg,#1a1030 0%,#0a0a14 50%,#0a1420 100%)"></div>`, prompt: `Create a dark hero gradient — subtle color-shifted gradient on a near-black background. Shift from deep purple-black at top through pure dark to deep blue-black at bottom. Adds richness and prevents flat, dead backgrounds. Keep the color shifts very subtle (barely perceptible).` },
    { name: "Inverted Logo", aka: "Dark mode logo, Light version", css: `<div style="display:flex;gap:8px;align-items:center"><div style="padding:4px 8px;background:#fff;border-radius:4px"><div style="font-size:10px;font-weight:800;color:#1a1a24">LOGO</div></div><div style="padding:4px 8px;background:#1a1a24;border-radius:4px;border:1px solid #2a2a3a"><div style="font-size:10px;font-weight:800;color:#fff">LOGO</div></div></div>`, prompt: `Prepare an inverted/light version of your logo for dark backgrounds — swap dark fills to light, adjust colors for sufficient contrast on dark surfaces. Some logos need completely different color treatments for dark mode. Use CSS prefers-color-scheme media query or a theme toggle to swap between versions.` },
    { name: "Dark Illustration", aka: "Night mode graphics, Dark-optimized", css: `<svg width="60" height="40" viewBox="0 0 60 40"><rect x="8" y="12" width="22" height="20" rx="3" fill="rgba(124,92,252,0.2)" stroke="#7c5cfc" stroke-width="1"/><polygon points="8,12 19,4 30,12" fill="rgba(124,92,252,0.15)" stroke="#7c5cfc" stroke-width="1"/><rect x="15" y="22" width="6" height="10" fill="#fcac5c" opacity="0.4"/><circle cx="48" cy="10" r="5" fill="#fcac5c" opacity="0.3"/></svg>`, prompt: `Adapt illustrations for dark mode — reduce color saturation and brightness, use semi-transparent fills instead of solids, add subtle strokes for definition. Dark mode illustrations should feel native, not just inverted. Consider separate dark/light illustration sets for the best result.` },
    { name: "True Black vs Dark Gray", aka: "OLED black, Pure dark", css: `<div style="display:flex;gap:3px"><div style="width:28px;height:36px;background:#000000;border-radius:4px;border:1px solid #1a1a1a;font-size:6px;color:#444;display:flex;align-items:end;padding:3px">#000</div><div style="width:28px;height:36px;background:#121218;border-radius:4px;border:1px solid #2a2a3a;font-size:6px;color:#444;display:flex;align-items:end;padding:3px">#121218</div></div>`, prompt: `Choose between true black (#000000) and dark gray (#121218) for dark mode backgrounds. True black saves battery on OLED screens but creates harsh contrast and "black hole" effect. Dark gray is more comfortable, allows shadow visibility, and supports elevation changes. Most design systems use dark gray (Material: #121212).` },
    { name: "Dark Mode Toggle", aka: "Theme switch, Light/dark control", css: `<div style="width:44px;height:22px;background:#2a2a3a;border-radius:11px;padding:2px;display:flex;align-items:center;position:relative"><div style="width:18px;height:18px;background:#7c5cfc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;margin-left:auto">🌙</div></div>`, prompt: `Design a dark mode toggle — a switch control with sun/moon icons that transitions between light and dark themes. Animate the toggle with a smooth slide and icon crossfade. Can also use a dropdown for system/light/dark options. Persist the preference in localStorage. Respect prefers-color-scheme for initial state.` }
  ]
},

// ─── RESPONSIVE DESIGN ───
{
  section: "Responsive Design",
  desc: "Techniques for adapting designs across screen sizes and devices.",
  items: [
    { name: "Breakpoint Shift", aka: "Media query, Layout switch", css: `<div style="display:flex;gap:3px;align-items:end"><div style="width:14px;height:24px;background:#2a2a3a;border:1px solid #3a3a4a;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;color:#555">S</div><div style="width:22px;height:16px;background:#2a2a3a;border:1px solid #3a3a4a;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;color:#555">M</div><div style="width:38px;height:22px;background:#1e1e2e;border:1px solid #7c5cfc;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;color:#7c5cfc">L</div></div>`, prompt: `Design for responsive breakpoints — common breakpoints: 640px (mobile), 768px (tablet), 1024px (laptop), 1280px (desktop), 1536px (wide). Stack columns on mobile, show side-by-side on desktop. Use CSS media queries or container queries. Mobile-first approach: design for small screens first, enhance for larger.` },
    { name: "Fluid Typography", aka: "Responsive text, Clamp sizing", css: `<div style="display:flex;flex-direction:column;gap:2px"><div style="font-size:16px;font-weight:800;color:#fff;line-height:1">Title</div><div style="font-size:7px;color:#666">clamp(1rem, 4vw, 3rem)</div></div>`, prompt: `Use fluid typography — font sizes that scale smoothly with viewport width using CSS clamp(). Example: font-size: clamp(1rem, 2.5vw + 0.5rem, 3rem). Text grows and shrinks fluidly between min and max values. No jumps at breakpoints. Modern alternative to media query font-size changes.` },
    { name: "Container Query", aka: "Component-level responsive", css: `<div style="width:80px;height:40px;background:#1a1a24;border-radius:6px;border:1px dashed rgba(124,92,252,0.3);display:flex;align-items:center;justify-content:center"><div style="padding:3px 8px;background:#7c5cfc;border-radius:4px;font-size:8px;color:#fff;font-weight:600">@container</div></div>`, prompt: `Use CSS container queries — @container rules that let components respond to their parent container's size instead of the viewport. Components become truly self-contained and reusable. Use for cards, widgets, or any component that might appear in different-width containers.` },
    { name: "Responsive Images", aka: "Art direction, srcset", css: `<div style="display:flex;gap:3px;align-items:center"><div style="width:20px;height:20px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c);border-radius:3px"></div><div style="font-size:8px;color:#555">→</div><div style="width:34px;height:20px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c);border-radius:3px"></div><div style="font-size:8px;color:#555">→</div><div style="width:24px;height:16px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c);border-radius:3px"></div></div>`, prompt: `Serve responsive images — use srcset and sizes attributes to deliver different image resolutions for different screen sizes/densities. Use the <picture> element for art direction (different crops per breakpoint). Serve WebP/AVIF with JPEG fallback. Critical for performance.` },
    { name: "Mobile-First Design", aka: "Small-screen first, Progressive enhancement", css: `<div style="display:flex;gap:3px;align-items:end"><div style="width:14px;height:24px;background:#7c5cfc;border:1px solid #9b7cff;border-radius:2px;font-size:6px;color:#fff;display:flex;align-items:end;justify-content:center;padding:1px">1st</div><div style="width:22px;height:16px;background:#2a2a3a;border:1px solid #3a3a4a;border-radius:2px"></div><div style="width:34px;height:22px;background:#2a2a3a;border:1px solid #3a3a4a;border-radius:2px"></div></div>`, prompt: `Design mobile-first — start with the smallest screen and progressively enhance for larger viewports. Use min-width media queries (not max-width). The mobile layout is the base CSS; larger screens add complexity. Forces content prioritization and ensures the core experience works everywhere.` },
    { name: "Responsive Grid Collapse", aka: "Grid reflow, Column stacking", css: `<div style="display:flex;gap:3px"><div style="display:flex;gap:2px"><div style="width:14px;height:18px;background:#7c5cfc;border-radius:3px"></div><div style="width:14px;height:18px;background:#fc5c8c;border-radius:3px"></div><div style="width:14px;height:18px;background:#5cfcb6;border-radius:3px"></div></div><div style="font-size:8px;color:#555;display:flex;align-items:center">→</div><div style="display:flex;flex-direction:column;gap:2px"><div style="width:14px;height:8px;background:#7c5cfc;border-radius:2px"></div><div style="width:14px;height:8px;background:#fc5c8c;border-radius:2px"></div><div style="width:14px;height:8px;background:#5cfcb6;border-radius:2px"></div></div></div>`, prompt: `Design grid collapse behavior — define how multi-column grids restructure at smaller breakpoints. 3 columns → 2 columns → 1 column (stacked). Cards may change from horizontal to vertical layout. Images may go from side-by-side to stacked. Plan the collapse logic for every grid in your design.` },
    { name: "Responsive Navigation", aka: "Nav collapse, Mobile menu", css: `<div style="display:flex;gap:4px;align-items:center"><div style="display:flex;gap:3px"><div style="padding:2px 6px;background:#2a2a3a;border-radius:3px;font-size:6px;color:#888">Home</div><div style="padding:2px 6px;background:#2a2a3a;border-radius:3px;font-size:6px;color:#888">About</div></div><div style="font-size:8px;color:#555">→</div><div style="display:flex;flex-direction:column;gap:2px;padding:2px"><div style="width:12px;height:1.5px;background:#888"></div><div style="width:12px;height:1.5px;background:#888"></div><div style="width:12px;height:1.5px;background:#888"></div></div></div>`, prompt: `Design responsive navigation — full horizontal nav on desktop, collapsing into a hamburger menu on mobile. Define the breakpoint where the switch occurs. Mobile menu can be full-screen overlay, slide-in drawer, or bottom sheet. Ensure all nav items remain accessible on all screen sizes.` },
    { name: "Aspect Ratio Responsive", aka: "Fluid aspect, Responsive embed", css: `<div style="width:80px;aspect-ratio:16/9;background:#1a1a24;border:1px solid #2a2a3a;border-radius:4px;display:flex;align-items:center;justify-content:center"><div style="font-size:8px;color:#555">16:9 fluid</div></div>`, prompt: `Use CSS aspect-ratio for responsive media containers — maintains proportions regardless of width. Use for video embeds (16:9), image thumbnails (4:3), square cards (1:1). Replaces the old padding-top percentage hack. The container scales fluidly while maintaining its aspect ratio.` }
  ]
},

// ─── MICRO-INTERACTIONS ───
{
  section: "Micro-Interactions",
  desc: "Small, focused animations that provide feedback and delight.",
  items: [
    { name: "Button Ripple", aka: "Material ripple, Touch feedback", css: `<div style="padding:6px 16px;background:#7c5cfc;border-radius:6px;font-size:11px;color:#fff;font-weight:600;position:relative;overflow:hidden"><div style="position:absolute;top:50%;left:50%;width:20px;height:20px;background:rgba(255,255,255,0.25);border-radius:50%;transform:translate(-50%,-50%)"></div>Click</div>`, prompt: `Create a ripple effect on button click — a circular wave that expands from the click point outward, fading as it grows. Material Design signature interaction. Use JS to position the ripple at click coordinates, then CSS animation for the expanding circle at 25% opacity white.` },
    { name: "Like Heart Animation", aka: "Double-tap like, Heart burst", css: `<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12,21 C8,17 2,13 2,8 A5,5,0,0,1,12,6 A5,5,0,0,1,22,8 C22,13 16,17 12,21Z" fill="#fc5c8c"/></svg></div>`, prompt: `Create a like/heart animation — heart scales up from 0 to 1.2 then settles at 1.0 with a spring ease, simultaneously changing color from gray to red/pink. Optionally add small particles/confetti bursting outward. Use for social media like buttons, favorite toggles, or appreciation actions.` },
    { name: "Checkbox Check Animation", aka: "Tick mark draw, Check-in", css: `<div style="width:22px;height:22px;background:#7c5cfc;border-radius:5px;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 14 14"><polyline points="3,7 6,10 11,4" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`, prompt: `Create a checkbox check animation — when checked, the box fills with brand color (scale or fade transition), then the checkmark draws in with a stroke-dasharray/stroke-dashoffset animation. Total duration ~300ms. Makes form completion feel rewarding.` },
    { name: "Hover Underline", aka: "Link underline reveal, Text hover", css: `<div style="position:relative;display:inline-block;padding-bottom:2px"><span style="font-size:13px;color:#7c5cfc;font-weight:600">Link text</span><div style="position:absolute;bottom:0;left:0;width:60%;height:2px;background:#7c5cfc;border-radius:1px;transition:width 0.3s ease"></div></div>`, prompt: `Create a hover underline animation — an underline that slides in from left (width: 0 → 100%) or center (scaleX: 0 → 1 with transform-origin: center) on hover. More elegant than text-decoration: underline. Use for navigation links or inline text links. Duration 200-300ms.` },
    { name: "Scroll Progress", aka: "Reading progress, Page position", css: `<div style="width:80px;height:3px;background:#1a1a24;border-radius:2px;overflow:hidden"><div style="width:40%;height:100%;background:linear-gradient(90deg,#7c5cfc,#fc5c8c);border-radius:2px"></div></div>`, prompt: `Create a scroll progress indicator — a thin bar at the very top of the page that fills left-to-right as the user scrolls down. Width = (scrollY / (docHeight - viewportHeight)) * 100%. Use position: fixed, top: 0, z-index: 9999. Great for articles, documentation, or long-form content.` },
    { name: "Number Counter", aka: "Count-up, Stat animation", css: `<div style="font-size:24px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums">1,247</div>`, prompt: `Create a number counter animation — a number that counts up from 0 to the target value when it scrolls into view. Use requestAnimationFrame with easing for smooth counting. Apply font-variant-numeric: tabular-nums so digits don't shift width. Use for statistics, metrics, or achievement displays.` },
    { name: "Skeleton to Content", aka: "Content load transition, Placeholder swap", css: `<div style="width:80px;display:flex;gap:3px"><div style="width:30px;height:30px;background:linear-gradient(90deg,#2a2a3a,#3a3a4a,#2a2a3a);background-size:200% 100%;border-radius:6px"></div><div style="flex:1;display:flex;flex-direction:column;gap:3px;justify-content:center"><div style="height:4px;background:linear-gradient(90deg,#2a2a3a,#3a3a4a,#2a2a3a);background-size:200% 100%;border-radius:2px;width:80%"></div><div style="height:4px;background:linear-gradient(90deg,#2a2a3a,#3a3a4a,#2a2a3a);background-size:200% 100%;border-radius:2px;width:50%"></div></div></div>`, prompt: `Animate the transition from skeleton placeholder to real content — skeleton blocks have a shimmer animation (moving gradient highlight). When data loads, crossfade from skeleton to content with a 200ms opacity transition. Prevents layout shift by matching skeleton dimensions to real content.` },
    { name: "Pull to Refresh", aka: "Swipe refresh, Rubber band", css: `<div style="width:60px;height:44px;background:#f3f4f6;border-radius:6px;display:flex;flex-direction:column;align-items:center;padding-top:4px"><svg width="16" height="16" viewBox="0 0 16 16" style="animation:spinDemo 1.5s linear infinite"><circle cx="8" cy="8" r="6" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-dasharray="26" stroke-dashoffset="8" stroke-linecap="round"/></svg><div style="font-size:6px;color:#6b7280;margin-top:2px">Pull to refresh</div></div>`, prompt: `Create a pull-to-refresh interaction — user pulls down on a scrolled-to-top list, revealing a spinner that triggers a data refresh. Include three states: pulling (arrow), threshold reached (spinner appears), refreshing (spinner animates). Add elastic rubber-band feel to the pull gesture.` },
    { name: "Swipe Actions", aka: "Slide to reveal, Gesture actions", css: `<div style="width:80px;height:24px;position:relative;border-radius:4px;overflow:hidden"><div style="position:absolute;right:0;top:0;bottom:0;width:24px;background:#fc3c3c;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff">🗑</div><div style="position:absolute;left:0;top:0;bottom:0;right:6px;background:#1e1e2e;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:8px;color:#888">Swipe me ←</div></div>`, prompt: `Create swipe-to-reveal actions — swiping a list item left/right reveals action buttons underneath (delete, archive, pin). Use for mobile lists like email, messages, or tasks. Color-code actions: red for delete, green for archive, blue for info. Include snap-back animation.` },
    { name: "Magnetic Snap", aka: "Cursor attraction, Sticky hover", css: `<div style="width:44px;height:44px;background:#7c5cfc;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;box-shadow:0 0 0 4px rgba(124,92,252,0.1);transition:transform 0.3s ease">⟶</div>`, prompt: `Create a magnetic snap interaction — elements that subtly move toward the cursor as it approaches, as if magnetically attracted. Use JS to calculate distance and apply transform: translate() proportional to proximity. Use for CTAs, cursor followers, or interactive hero elements. Subtle attraction = 5-15px max.` },
    { name: "Typewriter Effect", aka: "Typing animation, Character reveal", css: `<div style="font-size:12px;font-weight:600;color:#5cfcb6;font-family:monospace;border-right:2px solid #5cfcb6;display:inline;padding-right:2px;animation:blink 1s step-end infinite">Hello world_</div><style>@keyframes blink{0%,100%{border-color:transparent}50%{border-color:#5cfcb6}}</style>`, prompt: `Create a typewriter effect — text appears character by character with a blinking cursor at the end. Use CSS with steps() animation or JavaScript for more control. Include cursor blink when typing pauses. Use for hero headlines, terminal-themed UIs, chat interfaces, or AI response visualization.` },
    { name: "Parallax on Scroll", aka: "Depth scrolling, Layered motion", css: `<div style="width:80px;height:50px;position:relative;border-radius:8px;overflow:hidden;background:#0a0a1a"><div style="position:absolute;bottom:0;width:100%;height:20px;background:#1a1a2a;z-index:3"></div><div style="position:absolute;bottom:8px;left:10px;width:16px;height:20px;background:#2a2a4a;border-radius:2px 2px 0 0;z-index:2"></div><div style="position:absolute;top:8px;right:12px;width:10px;height:10px;background:#fcac5c;border-radius:50%;opacity:0.6;z-index:1"></div></div>`, prompt: `Create parallax scrolling — foreground, midground, and background layers move at different speeds as the user scrolls. Foreground moves fastest, background slowest. Creates an immersive depth illusion. Use CSS perspective + translateZ or JavaScript scroll calculations. Use for storytelling pages, landing heroes, or creative portfolios.` }
  ]
},

// ─── TYPOGRAPHY ADVANCED ───
{
  section: "Typography Advanced",
  desc: "Advanced typographic techniques for refined, professional text treatment.",
  items: [
    { name: "Kerning", aka: "Letter-spacing pairs, Optical spacing", css: `<div style="display:flex;flex-direction:column;gap:4px"><div style="font-size:16px;font-weight:700;color:#fc5c8c;letter-spacing:-0.5px">WAVE</div><div style="font-size:8px;color:#555">Tight tracking</div></div>`, prompt: `Adjust kerning (letter-spacing) — the space between specific letter pairs. Tighten tracking for headlines (-0.5 to -1px), loosen for small caps and labels (+2 to +4px). Use font-kerning: auto for built-in font kerning. Poor kerning makes "kern" look like "kem" — precision matters at large sizes.` },
    { name: "Leading", aka: "Line-height, Line spacing", css: `<div style="width:70px;font-size:9px;color:#888"><div style="line-height:1.2;margin-bottom:6px">Tight leading makes text dense and compact for impact.</div><div style="line-height:1.8">Open leading gives text room to breathe for readability.</div></div>`, prompt: `Adjust leading (line-height) — the vertical space between lines of text. Headlines: 1.1-1.2 (tight). Body text: 1.5-1.7 (comfortable). Small text: 1.6-1.8. Too tight = claustrophobic; too loose = disconnected. Line-height directly controls readability and page rhythm.` },
    { name: "Ligature", aka: "Connected letterforms, Type joins", css: `<div style="font-size:24px;font-weight:400;color:#e8e8f0;font-family:Georgia,serif;font-feature-settings:'liga' 1,'dlig' 1">fi fl ffi</div>`, prompt: `Enable typographic ligatures — special combined glyphs for letter pairs that would otherwise collide (fi, fl, ff, ffi). Use font-feature-settings: 'liga' for standard, 'dlig' for discretionary. Adds polish to editorial typography. Most quality fonts include standard ligatures.` },
    { name: "Hanging Punctuation", aka: "Optical margin, Outdented quotes", css: `<div style="width:70px;font-size:10px;color:#888;line-height:1.4;padding-left:4px"><span style="margin-left:-4px">"</span>Good typography is invisible. Bad typography is everywhere."</div>`, prompt: `Apply hanging punctuation — quotation marks and hyphens extend slightly past the text margin to maintain a clean optical edge. Use CSS hanging-punctuation property or manual negative margins. Marks that "indent" the first line (", ', -) should hang outside the text block for professional typesetting.` },
    { name: "Variable Font", aka: "Parametric font, Weight axis", css: `<div style="display:flex;flex-direction:column;gap:1px"><div style="font-size:12px;font-weight:300;color:#888">Light 300</div><div style="font-size:12px;font-weight:500;color:#bbb">Medium 500</div><div style="font-size:12px;font-weight:800;color:#fff">ExtraBold 800</div></div>`, prompt: `Use a variable font — a single font file with adjustable axes (weight, width, slant, optical size). Instead of loading separate files for each weight, use font-variation-settings or standard properties. Smooth weight animations possible. Smaller file size, infinite design flexibility.` },
    { name: "Text Truncation", aka: "Ellipsis, Overflow clamp", css: `<div style="width:70px"><div style="font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">This is a very long text that will be truncated</div></div>`, prompt: `Apply text truncation with ellipsis — single line: text-overflow: ellipsis with white-space: nowrap and overflow: hidden. Multi-line: use -webkit-line-clamp with display: -webkit-box. Essential for card descriptions, table cells, and any constrained text container. Always provide full text on hover/focus.` },
    { name: "Text Balance & Wrap", aka: "Text-wrap balance, Even lines", css: `<div style="width:70px;text-align:center"><div style="font-size:11px;font-weight:700;color:#e8e8f0;line-height:1.3">A Nicely Balanced Headline</div></div>`, prompt: `Use text-wrap: balance to distribute text evenly across lines — prevents awkward short final lines in centered headlines. CSS text-wrap: balance makes each line approximately the same length. Use for headlines, pull quotes, and centered text. Alternative: text-wrap: pretty for body text.` },
  ]
},

// ─── FORM ELEMENTS ───
{
  section: "Form Elements",
  desc: "Input controls and form patterns for collecting user data.",
  items: [
    { name: "Text Input", aka: "Text field, Input box", css: `<div style="width:80px;padding:6px 10px;background:#1a1a24;border:1px solid #3a3a4a;border-radius:6px;font-size:10px;color:#a1a1aa">Placeholder...</div>`, prompt: `Design a text input field — a bordered rectangle with placeholder text, padding (8-12px), and clear focus state (colored border + subtle glow). Include label above the field and helper text below. Standard height: 36-44px. Use consistent border-radius with your design system.` },
    { name: "Floating Label", aka: "Material input, Animated label", css: `<div style="width:80px;position:relative;padding:10px 10px 6px;background:#1a1a24;border:1px solid #7c5cfc;border-radius:6px"><div style="position:absolute;top:-6px;left:8px;background:#1a1a24;padding:0 4px;font-size:8px;color:#7c5cfc;font-weight:600">Email</div><div style="font-size:10px;color:#e8e8f0">user@mail.com</div></div>`, prompt: `Create a floating label input — the label starts as placeholder inside the input, then animates to a small label above the border when focused or filled. Use transform: translateY(-100%) scale(0.85). Saves vertical space while maintaining clear labeling. Material Design standard pattern.` },
    { name: "Select / Dropdown", aka: "Combobox, Picker", css: `<div style="width:80px;padding:6px 10px;background:#1a1a24;border:1px solid #3a3a4a;border-radius:6px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:#e8e8f0">Option</span><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2,3.5 L5,6.5 L8,3.5" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/></svg></div>`, prompt: `Design a select/dropdown — a trigger button showing the selected value with a chevron icon, that opens a floating list of options. Include search/filter for long lists. Highlight hovered option, checkmark for selected. Use Radix, Headless UI, or custom for full control beyond native <select>.` },
    { name: "Radio Button", aka: "Single select, Option button", css: `<div style="display:flex;flex-direction:column;gap:4px"><div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border:2px solid #7c5cfc;border-radius:50%;display:flex;align-items:center;justify-content:center"><div style="width:7px;height:7px;background:#7c5cfc;border-radius:50%"></div></div><span style="font-size:9px;color:#e8e8f0">Selected</span></div><div style="display:flex;align-items:center;gap:5px"><div style="width:14px;height:14px;border:2px solid #3a3a4a;border-radius:50%"></div><span style="font-size:9px;color:#888">Option</span></div></div>`, prompt: `Design radio buttons — circular controls for mutually exclusive options (only one selectable). Selected state: filled inner circle in brand color. Use custom styling over native for consistency. Always group related radios. Use for 2-5 options visible at once; use a dropdown for more.` },
    { name: "Range Slider", aka: "Slider control, Track and thumb", css: `<div style="width:80px;height:20px;display:flex;align-items:center"><div style="flex:1;height:4px;background:#2a2a3a;border-radius:2px;position:relative"><div style="width:55%;height:100%;background:#7c5cfc;border-radius:2px"></div><div style="position:absolute;top:50%;left:55%;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div></div></div>`, prompt: `Design a range slider — a horizontal track with a draggable thumb to select a value within a range. Filled track (left of thumb) in brand color, unfilled in gray. Show current value above/beside the thumb on drag. Use for price filters, volume controls, or any continuous value selection.` },
    { name: "Search Bar", aka: "Search input, Query field", css: `<div style="width:80px;padding:6px 8px;background:#1a1a24;border:1px solid #3a3a4a;border-radius:8px;display:flex;align-items:center;gap:5px"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="5" cy="5" r="3.5" fill="none" stroke="#a1a1aa" stroke-width="1.5"/><line x1="8" y1="8" x2="11" y2="11" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/></svg><span style="font-size:9px;color:#a1a1aa">Search…</span></div>`, prompt: `Design a search bar with a magnifying glass icon, placeholder text, and optionally a keyboard shortcut hint (⌘K). On focus: expand width or show overlay. Include autocomplete/suggestions dropdown. Use for global search, filtering lists, or command palettes. Rounded or pill-shaped is common.` },
    { name: "Date Picker", aka: "Calendar input, Date selector", css: `<div style="width:80px;padding:4px;background:#1a1a24;border:1px solid #3a3a4a;border-radius:6px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:7px;color:#888">◀</span><span style="font-size:7px;color:#e8e8f0;font-weight:600">Mar 2026</span><span style="font-size:7px;color:#888">▶</span></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px"><div style="font-size:5px;color:#555;text-align:center">M</div><div style="font-size:5px;color:#555;text-align:center">T</div><div style="font-size:5px;color:#555;text-align:center">W</div><div style="font-size:5px;color:#555;text-align:center">T</div><div style="font-size:5px;color:#555;text-align:center">F</div><div style="font-size:5px;color:#555;text-align:center">S</div><div style="font-size:5px;color:#555;text-align:center">S</div><div style="font-size:6px;color:#888;text-align:center">1</div><div style="font-size:6px;color:#888;text-align:center">2</div><div style="font-size:6px;color:#888;text-align:center">3</div><div style="font-size:6px;color:#fff;text-align:center;background:#7c5cfc;border-radius:50%;width:10px;height:10px;display:flex;align-items:center;justify-content:center;margin:auto">4</div><div style="font-size:6px;color:#888;text-align:center">5</div><div style="font-size:6px;color:#888;text-align:center">6</div><div style="font-size:6px;color:#888;text-align:center">7</div></div></div>`, prompt: `Design a date picker — a calendar dropdown with month/year navigation, day grid, today indicator, selected date highlight, and disabled dates. Include keyboard navigation. Selected date: brand color circle. Today: outlined circle. Range selection variant: colored span between two dates.` },
    { name: "Checkbox", aka: "Tick box, Boolean check", css: `<div style="display:flex;gap:6px"><div style="width:16px;height:16px;background:#7c5cfc;border-radius:4px;display:flex;align-items:center;justify-content:center"><svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div style="width:16px;height:16px;border:2px solid #3a3a4a;border-radius:4px"></div></div>`, prompt: `Design custom checkboxes — square with rounded corners, checkmark appears with a draw animation when checked. Checked: brand color fill + white checkmark. Unchecked: bordered, empty. Indeterminate state: dash instead of checkmark. Use for multi-select options, to-do items, or terms agreement.` },
    { name: "Textarea", aka: "Multi-line input, Text area", css: `<div style="width:80px;height:36px;padding:4px 6px;background:#1a1a24;border:1px solid #3a3a4a;border-radius:6px;font-size:8px;color:#555;line-height:1.3;position:relative">Type your message here...<div style="position:absolute;bottom:2px;right:4px;width:8px;height:8px;background:linear-gradient(135deg,transparent 50%,#3a3a4a 50%)"></div></div>`, prompt: `Design a textarea — multi-line text input with resize handle (corner grip indicator). Include character count, auto-grow option, and proper label. Minimum height: 3 lines. Add a subtle bottom-right resize indicator. Use for comments, descriptions, feedback forms, or long-form input.` },
    { name: "File Upload", aka: "Drop zone, File picker", css: `<div style="width:80px;height:36px;border:1.5px dashed #3a3a4a;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px"><svg width="14" height="14" viewBox="0 0 14 14"><path d="M7,2 L7,9 M4,5 L7,2 L10,5" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2,10 L2,12 L12,12 L12,10" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><div style="font-size:6px;color:#a1a1aa">Drop files here</div></div>`, prompt: `Design a file upload zone — a dashed-border area that accepts drag-and-drop files. Include upload icon, "Drop files here or browse" text, and file type/size restrictions. Show upload progress bar per file. Highlight the zone (change border color) when a file is dragged over it.` },
    { name: "Color Picker", aka: "Color chooser, Hue selector", css: `<div style="display:flex;gap:3px;align-items:end"><div style="width:20px;height:20px;border-radius:4px;background:linear-gradient(to right,#fff,#7c5cfc);position:relative"><div style="position:absolute;width:20px;height:20px;background:linear-gradient(to bottom,transparent,#000);border-radius:4px"></div><div style="position:absolute;top:6px;left:12px;width:6px;height:6px;border:1.5px solid #fff;border-radius:50%"></div></div><div style="width:6px;height:20px;background:linear-gradient(to bottom,red,yellow,lime,cyan,blue,magenta,red);border-radius:2px"></div></div>`, prompt: `Design a color picker — a saturation/brightness square with a hue slider strip. Include a circular selector handle, hex/RGB input fields, saved swatches, and an eyedropper tool. Support opacity via a checkerboard-backed alpha slider. Use for theme customization, drawing tools, or design systems.` },
    { name: "OTP / PIN Input", aka: "Verification code, One-time password", css: `<div style="display:flex;gap:4px"><div style="width:16px;height:20px;background:#1a1a24;border:1.5px solid #7c5cfc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">4</div><div style="width:16px;height:20px;background:#1a1a24;border:1.5px solid #7c5cfc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">7</div><div style="width:16px;height:20px;background:#1a1a24;border:1.5px solid #3a3a4a;border-radius:4px;display:flex;align-items:center;justify-content:center"><div style="width:2px;height:12px;background:#7c5cfc;animation:blink 1s step-end infinite"></div></div><div style="width:16px;height:20px;background:#1a1a24;border:1.5px solid #3a3a4a;border-radius:4px"></div></div>`, prompt: `Design an OTP/PIN input — a row of individual digit boxes (4-6 cells). Auto-advance focus to the next cell after each digit. Support paste of full code. Active cell has a blinking cursor and highlighted border. Use for 2FA verification, phone confirmation, or secure PIN entry.` },
    { name: "Star Rating", aka: "Review stars, Score input", css: `<div style="display:flex;gap:2px"><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" fill="#fcac5c"/></svg><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" fill="#fcac5c"/></svg><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" fill="#fcac5c"/></svg><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" fill="#fcac5c" opacity="0.3"/></svg><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 8.5,5 13,5.5 9.5,8.5 10.5,13 7,10.5 3.5,13 4.5,8.5 1,5.5 5.5,5" fill="#fcac5c" opacity="0.3"/></svg></div>`, prompt: `Design a star rating input — 5 stars that fill on hover/click. Support half-star precision. Filled stars in gold/amber, empty in gray/low-opacity. Show numeric rating alongside (3.5/5). Use for product reviews, service ratings, or feedback collection. Make interactive (clickable) for input, static for display.` }
  ]
},

// ─── PSYCHOLOGICAL DESIGN ───
{
  section: "Psychological Design Principles",
  desc: "Visual techniques that leverage human psychology to guide behavior and perception.",
  items: [
    { name: "Visual Weight", aka: "Optical gravity, Dominance", css: `<div style="display:flex;gap:8px;align-items:center"><div style="width:40px;height:40px;background:#7c5cfc;border-radius:50%"></div><div style="width:16px;height:16px;background:#fc5c8c;border-radius:50%"></div></div>`, prompt: `Use visual weight to create hierarchy — larger, darker, more saturated elements carry more visual weight and draw the eye first. Balance a single heavy element with several lighter ones. Place the "heaviest" element at your focal point. Weight comes from: size, color, density, contrast, and isolation.` },
    { name: "Gestalt: Proximity", aka: "Grouping by nearness, Clustering", css: `<div style="display:flex;gap:3px"><div style="display:flex;gap:2px"><div style="width:10px;height:10px;background:#7c5cfc;border-radius:3px"></div><div style="width:10px;height:10px;background:#7c5cfc;border-radius:3px"></div><div style="width:10px;height:10px;background:#7c5cfc;border-radius:3px"></div></div><div style="width:8px"></div><div style="display:flex;gap:2px"><div style="width:10px;height:10px;background:#fc5c8c;border-radius:3px"></div><div style="width:10px;height:10px;background:#fc5c8c;border-radius:3px"></div></div></div>`, prompt: `Apply the Gestalt principle of proximity — elements placed close together are perceived as related/grouped. Use consistent spacing: tighter spacing within groups, wider spacing between groups. No borders needed — space itself creates grouping. Foundation of information architecture in UI.` },
    { name: "Gestalt: Similarity", aka: "Grouping by likeness, Pattern recognition", css: `<div style="display:flex;gap:3px;flex-wrap:wrap;width:60px"><div style="width:10px;height:10px;background:#7c5cfc;border-radius:50%"></div><div style="width:10px;height:10px;background:#7c5cfc;border-radius:50%"></div><div style="width:10px;height:10px;background:#fc5c8c;border-radius:3px"></div><div style="width:10px;height:10px;background:#7c5cfc;border-radius:50%"></div><div style="width:10px;height:10px;background:#fc5c8c;border-radius:3px"></div><div style="width:10px;height:10px;background:#fc5c8c;border-radius:3px"></div></div>`, prompt: `Apply the Gestalt principle of similarity — elements that share visual properties (color, shape, size) are perceived as belonging to the same group. Use consistent styling for same-category items. Break similarity deliberately to draw attention to exceptions (the Von Restorff effect).` },
    { name: "Von Restorff Effect", aka: "Isolation effect, Distinctiveness", css: `<div style="display:flex;gap:3px;align-items:center"><div style="width:12px;height:12px;background:#2a2a3a;border-radius:3px"></div><div style="width:12px;height:12px;background:#2a2a3a;border-radius:3px"></div><div style="width:16px;height:16px;background:#fc5c8c;border-radius:50%;box-shadow:0 0 8px rgba(252,92,140,0.4)"></div><div style="width:12px;height:12px;background:#2a2a3a;border-radius:3px"></div><div style="width:12px;height:12px;background:#2a2a3a;border-radius:3px"></div></div>`, prompt: `Apply the Von Restorff (isolation) effect — an item that differs from its neighbors is remembered better. Make your primary CTA visually distinct from surrounding elements in color, size, or shape. Use for pricing table highlights ("Most Popular"), key features, or the primary action among a group.` },
    { name: "Fitts's Law", aka: "Target size, Touch target", css: `<div style="display:flex;gap:6px;align-items:center"><div style="width:44px;height:44px;background:#7c5cfc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:600">Easy</div><div style="width:18px;height:18px;background:#2a2a3a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:6px;color:#666">Hard</div></div>`, prompt: `Apply Fitts's Law — the time to reach a target is proportional to the distance and inversely proportional to its size. Make important targets (CTAs, submit buttons) large and position them near likely cursor/finger positions. Minimum touch target: 44×44px (WCAG). Larger targets = faster, easier interaction.` },
    { name: "Social Proof Signals", aka: "Trust indicators, Credibility cues", css: `<div style="display:flex;align-items:center;gap:3px"><div style="display:flex"><div style="width:16px;height:16px;background:#7c5cfc;border-radius:50%;border:2px solid #13131a"></div><div style="width:16px;height:16px;background:#fc5c8c;border-radius:50%;border:2px solid #13131a;margin-left:-6px"></div><div style="width:16px;height:16px;background:#5cfcb6;border-radius:50%;border:2px solid #13131a;margin-left:-6px"></div></div><span style="font-size:8px;color:#888">+2.4k users</span></div>`, prompt: `Design social proof elements — overlapping avatar stacks with "+N users" count, star ratings, client logos, testimonial cards, or "X people are viewing this." These visual cues leverage social proof psychology. Position near CTAs to increase conversion. Overlapping avatars use negative margins.` },
    { name: "Hick's Law", aka: "Choice overload, Decision paralysis", css: `<div style="display:flex;gap:6px;align-items:center"><div style="display:flex;gap:2px"><div style="padding:3px 8px;background:#7c5cfc;border-radius:4px;font-size:7px;color:#fff;font-weight:600">Yes</div><div style="padding:3px 8px;background:#2a2a3a;border-radius:4px;font-size:7px;color:#888">No</div></div><div style="font-size:8px;color:#5cfcb6">✓</div></div>`, prompt: `Apply Hick's Law — decision time increases logarithmically with the number of options. Reduce choices to speed up decisions. Use progressive disclosure (show basics first, details on demand). Limit navigation to 5-7 items. Pricing tables: 3 plans max. Too many CTAs = no action taken.` },
    { name: "Miller's Law", aka: "Chunking, 7±2 rule", css: `<div style="display:flex;gap:6px"><div style="display:flex;gap:2px"><div style="width:6px;height:6px;background:#7c5cfc;border-radius:2px"></div><div style="width:6px;height:6px;background:#7c5cfc;border-radius:2px"></div><div style="width:6px;height:6px;background:#7c5cfc;border-radius:2px"></div></div><div style="display:flex;gap:2px"><div style="width:6px;height:6px;background:#fc5c8c;border-radius:2px"></div><div style="width:6px;height:6px;background:#fc5c8c;border-radius:2px"></div><div style="width:6px;height:6px;background:#fc5c8c;border-radius:2px"></div></div><div style="display:flex;gap:2px"><div style="width:6px;height:6px;background:#5cfcb6;border-radius:2px"></div><div style="width:6px;height:6px;background:#5cfcb6;border-radius:2px"></div><div style="width:6px;height:6px;background:#5cfcb6;border-radius:2px"></div></div></div>`, prompt: `Apply Miller's Law — people can hold about 7 (±2) items in working memory. Break content into chunks of 3-5 items. Use visual grouping, whitespace, and headings to create manageable clusters. Phone numbers are chunked (555-123-4567), not (5551234567). Apply to nav menus, feature lists, and form sections.` },
    { name: "Anchoring", aka: "Price anchor, Reference point", css: `<div style="display:flex;gap:4px;align-items:center"><div style="font-size:12px;font-weight:700;color:#555;text-decoration:line-through">$199</div><div style="font-size:16px;font-weight:800;color:#5cfcb6">$49</div></div>`, prompt: `Use anchoring — the first piece of information (the anchor) influences subsequent judgments. Show the original/higher price before the discounted price. Place the premium plan first in pricing tables so the standard plan feels affordable. The anchor creates a reference frame for all subsequent comparisons.` },
    { name: "Serial Position Effect", aka: "Primacy/Recency, First and last", css: `<div style="display:flex;gap:2px;align-items:center"><div style="width:14px;height:14px;background:#fc5c8c;border-radius:3px;font-size:6px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">1</div><div style="width:10px;height:10px;background:#2a2a3a;border-radius:2px"></div><div style="width:10px;height:10px;background:#2a2a3a;border-radius:2px"></div><div style="width:10px;height:10px;background:#2a2a3a;border-radius:2px"></div><div style="width:14px;height:14px;background:#5cfcb6;border-radius:3px;font-size:6px;color:#000;display:flex;align-items:center;justify-content:center;font-weight:700">5</div></div>`, prompt: `Apply the serial position effect — people remember the first (primacy) and last (recency) items in a list best. Place your most important features, nav items, or options at the beginning and end. The middle items are most likely to be forgotten. Put key CTAs first and last in navigation.` }
  ]
},

// ─── TRENDING & MODERN EFFECTS ───
{
  section: "Trending & Modern Effects",
  desc: "Cutting-edge visual styles and effects dominating contemporary design in 2024–2026.",
  items: [
    { name: "Liquid Glass", aka: "Apple Glass, iOS 26 glass, Fluid transparency", css: `<div style="width:70px;height:46px;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.12) 100%);backdrop-filter:blur(20px) saturate(1.8);border:1px solid rgba(255,255,255,0.25);box-shadow:inset 0 1px 1px rgba(255,255,255,0.3),inset 0 -1px 1px rgba(0,0,0,0.05),0 8px 32px rgba(0,0,0,0.12);position:relative;overflow:hidden"><div style="position:absolute;top:-10px;left:-5px;width:40px;height:20px;background:rgba(255,255,255,0.08);border-radius:50%;filter:blur(6px);transform:rotate(-15deg)"></div></div>`, prompt: `Create a liquid glass effect (Apple iOS 26 / visionOS style): semi-transparent surface with high backdrop-filter blur (20-40px), increased saturation (saturate 1.5-2.0), a subtle inner white glow along the top edge, very thin white border (20-30% opacity), and a soft specular highlight (elliptical white gradient at the top). The surface should feel like real glass — refracting and tinting the content behind it. Colors from the background should bleed through with a frosted, luminous quality. Add a very subtle inner shadow at the bottom edge. This is more refined than basic glassmorphism — the key difference is the saturation boost, multi-layered specular highlights, and the organic, flowing feel of the reflections.` },
    { name: "Liquid Glass Card", aka: "Floating glass panel, Translucent card", css: `<div style="width:74px;height:48px;border-radius:18px;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,0.22),rgba(255,255,255,0.04) 40%,rgba(255,255,255,0.1) 80%);backdrop-filter:blur(24px) saturate(1.6);border:1px solid rgba(255,255,255,0.2)"></div><div style="position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);border-radius:18px 18px 0 0"></div><div style="position:relative;z-index:1;padding:8px;display:flex;align-items:center;gap:6px"><div style="width:16px;height:16px;background:rgba(124,92,252,0.5);border-radius:50%;backdrop-filter:blur(4px)"></div><div><div style="height:3px;width:28px;background:rgba(255,255,255,0.4);border-radius:2px;margin-bottom:3px"></div><div style="height:2px;width:20px;background:rgba(255,255,255,0.2);border-radius:2px"></div></div></div></div>`, prompt: `Create a liquid glass card component: a content card with the full liquid glass treatment — high blur (24px+), saturation boost, layered specular highlights on top half, thin luminous border, and content floating inside. Icons and elements within the card should also have subtle glass treatments. The card should feel like it's floating in space, bending light around it. Use for notification cards, widget panels, control centers, or any elevated UI element.` },
    { name: "Liquid Glass Tab Bar", aka: "iOS glass nav, Floating tab bar", css: `<div style="width:80px;height:28px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,0.2),rgba(255,255,255,0.06));backdrop-filter:blur(20px) saturate(1.8);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:space-around;padding:0 8px;box-shadow:0 4px 16px rgba(0,0,0,0.1)"><div style="width:10px;height:10px;background:rgba(124,92,252,0.6);border-radius:50%"></div><div style="width:10px;height:10px;background:rgba(255,255,255,0.15);border-radius:50%"></div><div style="width:10px;height:10px;background:rgba(255,255,255,0.15);border-radius:50%"></div><div style="width:10px;height:10px;background:rgba(255,255,255,0.15);border-radius:50%"></div></div>`, prompt: `Create a liquid glass tab bar (iOS 26 style): a pill-shaped floating navigation bar with liquid glass material — high blur, saturation, luminous top edge, and rounded pill shape. Active tab icon is tinted with the accent color and may have a subtle glow. The entire bar floats above content with a soft shadow. This replaces the traditional opaque bottom tab bar with something that feels integrated with the content flowing behind it.` },
    { name: "Caustics", aka: "Water refraction, Light patterns, Pool reflections", css: `<div style="width:80px;height:50px;border-radius:8px;background:#e0f2fe;position:relative;overflow:hidden"><svg width="100%" height="100%" style="position:absolute;inset:0;opacity:0.3"><filter id="caustic"><feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="1"/><feColorMatrix type="hueRotate" values="180"/><feComponentTransfer><feFuncR type="discrete" tableValues="0 1"/><feFuncG type="discrete" tableValues="0 1"/><feFuncB type="discrete" tableValues="0 0.8"/></feComponentTransfer></filter><rect width="100%" height="100%" filter="url(#caustic)"/></svg><div style="position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(92,252,220,0.15),transparent 50%),radial-gradient(ellipse at 70% 60%,rgba(92,180,252,0.1),transparent 40%)"></div></div>`, prompt: `Create caustic light patterns — the shimmering, web-like light patterns you see at the bottom of a swimming pool or through glass. Use SVG turbulence filters with high contrast, or animated overlapping radial gradients in cyan/teal. Animate slowly for a mesmerizing, underwater refraction effect. Use for luxury brands, water-themed design, or ambient backgrounds.` },
    { name: "Prismatic / Rainbow Refraction", aka: "Light split, Spectrum dispersion", css: `<div style="width:70px;height:46px;border-radius:10px;background:#f9fafb;position:relative;overflow:hidden;border:1px solid #e5e7eb"><div style="position:absolute;top:5px;left:10px;width:50px;height:6px;background:linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff);filter:blur(3px);opacity:0.6;transform:rotate(-5deg)"></div><div style="position:absolute;bottom:12px;left:5px;width:60px;height:4px;background:linear-gradient(90deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff);filter:blur(2px);opacity:0.4;transform:rotate(3deg)"></div></div>`, prompt: `Create a prismatic/rainbow refraction effect — thin rainbow light streaks that appear to refract through a glass or crystal surface. Use blurred, narrow gradient strips at slight angles. Simulate light dispersion (splitting white light into spectrum). Use for premium product photography, jewelry brands, or sci-fi interfaces. Animate with subtle shifting for a living, light-catching feel.` },
    { name: "Lens Flare", aka: "Light leak, Sun flare, Anamorphic streak", css: `<div style="width:80px;height:50px;border-radius:8px;background:#1a1a24;position:relative;overflow:hidden"><div style="position:absolute;top:10px;right:15px;width:12px;height:12px;background:rgba(255,240,200,0.8);border-radius:50%;box-shadow:0 0 20px rgba(255,240,200,0.6),0 0 60px rgba(255,200,100,0.3)"></div><div style="position:absolute;top:12px;right:5px;width:40px;height:2px;background:linear-gradient(90deg,transparent,rgba(255,200,100,0.4),transparent);transform:rotate(-5deg)"></div><div style="position:absolute;top:28px;left:10px;width:8px;height:8px;background:rgba(100,200,255,0.3);border-radius:50%"></div><div style="position:absolute;top:22px;left:30px;width:5px;height:5px;background:rgba(100,255,100,0.2);border-radius:50%"></div></div>`, prompt: `Create a lens flare effect — a bright light source with streaks, secondary ghost circles, and anamorphic horizontal lines. The main light has a bright core with a soft halo. Ghost circles appear at intervals along a line from the source (lens elements catching light). Use for cinematic hero sections, photography themes, or adding dramatic atmosphere.` },
    { name: "Smoke / Fog", aka: "Mist, Vapor, Atmospheric haze", css: `<div style="width:80px;height:50px;border-radius:8px;background:#1a1a24;position:relative;overflow:hidden"><div style="position:absolute;bottom:-5px;left:-10px;width:50px;height:30px;background:rgba(255,255,255,0.15);border-radius:50%;filter:blur(10px)"></div><div style="position:absolute;bottom:0;right:-5px;width:40px;height:25px;background:rgba(255,255,255,0.1);border-radius:50%;filter:blur(12px)"></div><div style="position:absolute;bottom:5px;left:20px;width:60px;height:20px;background:rgba(255,255,255,0.08);border-radius:50%;filter:blur(14px)"></div></div>`, prompt: `Create a smoke/fog effect — soft, amorphous cloudy shapes using heavily blurred semi-transparent ellipses. Layer multiple at different sizes, positions, and opacities. Animate with slow drifting motion using CSS transforms. Use for atmospheric backgrounds, mystery/horror themes, or adding depth to dark scenes. Can be colored for neon smoke effects.` },
    { name: "Light Trails", aka: "Light painting, Neon streak", css: `<svg width="80" height="50" viewBox="0 0 80 50"><path d="M5,40 Q15,30 25,35 Q35,15 50,25 Q60,10 75,15" fill="none" stroke="url(#trailGrad)" stroke-width="2.5" stroke-linecap="round"><animate attributeName="stroke-dasharray" from="0 200" to="200 200" dur="2s" fill="freeze"/></path><defs><linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c5cfc" stop-opacity="0"/><stop offset="50%" stop-color="#fc5c8c"/><stop offset="100%" stop-color="#5cfcb6"/></linearGradient></defs></svg>`, prompt: `Create light trail effects — glowing lines that trace a path, fading from bright to transparent. Use SVG paths with gradient strokes and stroke-dasharray animation. Simulate long-exposure light painting photography. Use for data flow visualization, gaming themes, sci-fi UI, or creative hero animations.` },
    { name: "Y2K / Cyber Aesthetic", aka: "Early 2000s, Futuristic retro", css: `<div style="width:80px;height:50px;border-radius:4px;background:linear-gradient(135deg,#c0c0c0,#e8e8e8);position:relative;overflow:hidden"><div style="position:absolute;top:5px;left:5px;width:20px;height:20px;background:linear-gradient(135deg,#0066ff,#00ccff);border-radius:50%;opacity:0.7"></div><div style="position:absolute;bottom:5px;right:5px;font-size:8px;font-weight:900;color:#ff00ff;text-shadow:1px 1px 0 #0066ff">Y2K</div><div style="position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.4),transparent)"></div></div>`, prompt: `Create Y2K aesthetic — shiny metallic surfaces, chrome/silver gradients, bright blue and hot pink accents, glossy bubbles, futuristic-retro elements inspired by early 2000s web and product design. Features: metallic textures, translucent colored plastic, orbital/tech shapes, starburst graphics. Use for nostalgic branding, fashion, or trend-forward design.` },
    { name: "Vaporwave", aka: "Aesthetic, 90s internet, Retrowave", css: `<div style="width:80px;height:50px;border-radius:4px;background:linear-gradient(180deg,#ff71ce,#b967ff 40%,#01cdfe 70%,#05ffa1);position:relative;overflow:hidden"><div style="position:absolute;bottom:0;width:100%;height:30%;background:linear-gradient(0deg,rgba(0,0,0,0.3),transparent)"></div><div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:300;color:rgba(255,255,255,0.8);font-family:serif;letter-spacing:3px">美</div></div>`, prompt: `Create vaporwave aesthetic — pastel gradients (pink, purple, cyan, mint), Greek/Roman statues, Japanese text, 90s computer graphics, sunset palettes, and dreamy/surreal imagery. Use for music projects, nostalgic internet culture, or ironic/artistic branding. The palette is typically: hot pink, lavender, cyan, and mint green.` },
    { name: "Bento Grid", aka: "Dashboard mosaic, Apple feature grid", css: `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:80px"><div style="grid-column:span 2;height:20px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a"></div><div style="height:20px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a"></div><div style="height:20px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a"></div><div style="grid-column:span 2;height:20px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a"></div></div>`, prompt: `Create a Bento grid layout — a mosaic-style grid where cards of varying sizes (1×1, 2×1, 1×2, 2×2) are arranged like a Japanese bento box. Popularized by Apple's feature pages. Each cell showcases one feature/product with an icon, title, and visual. Use generous border-radius, consistent gaps, and subtle borders. The asymmetric grid creates visual interest while maintaining order.` },
    { name: "Grain Film Effect", aka: "Analog grain, Cinematic texture", css: `<div style="width:80px;height:50px;border-radius:8px;background:linear-gradient(135deg,#e5e7eb,#d1d5db);position:relative;overflow:hidden"><svg width="100%" height="100%" style="position:absolute;inset:0;mix-blend-mode:overlay"><filter id="filmGrain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#filmGrain)" opacity="0.6"/></svg></div>`, prompt: `Create a film grain effect — a visible noise texture that mimics analog film stock. Use SVG feTurbulence with mix-blend-mode: overlay at 20-40% opacity. More pronounced than subtle noise gradients. Adds cinematic warmth, vintage authenticity, and tactile quality. Animate the seed value for moving grain (like real film). Use for photography portfolios, editorial design, or indie brand aesthetics.` },
    { name: "Displacement / Distortion", aka: "Warp effect, Ripple distortion", css: `<div style="width:80px;height:50px;border-radius:8px;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(135deg,#7c5cfc,#fc5c8c)"></div><svg width="100%" height="100%" style="position:absolute;inset:0"><filter id="displace"><feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" seed="3"/><feDisplacementMap in="SourceGraphic" scale="10"/></filter><rect width="100%" height="100%" filter="url(#displace)" fill="transparent"/></svg></div>`, prompt: `Create a displacement/distortion effect — warp an image or element as if viewed through textured glass or water. Use SVG feDisplacementMap with feTurbulence as the displacement source. Adjust scale for intensity. Use for artistic photo treatments, hover effects (distort on mouseover), or creating organic, liquid-like visuals.` },
    { name: "Moiré Pattern", aka: "Interference pattern, Optical illusion", css: `<div style="width:80px;height:50px;border-radius:8px;position:relative;overflow:hidden;background:#f3f4f6"><div style="position:absolute;inset:0;background:repeating-radial-gradient(circle at 50% 50%,transparent,transparent 3px,rgba(124,92,252,0.3) 3px,rgba(124,92,252,0.3) 4px)"></div><div style="position:absolute;inset:0;background:repeating-radial-gradient(circle at 55% 45%,transparent,transparent 3px,rgba(252,92,140,0.2) 3px,rgba(252,92,140,0.2) 4px)"></div></div>`, prompt: `Create a moiré pattern — an optical interference pattern created by overlaying two sets of lines or grids at slightly different angles or scales. Creates mesmerizing, vibrating visual effects. Use overlapping repeating-radial-gradient or repeating-linear-gradient at slight offsets. Use for avant-garde design, op-art inspired visuals, or fashion branding.` },
    { name: "Anaglyph 3D", aka: "Red-cyan 3D, Stereoscopic", css: `<div style="position:relative;font-size:22px;font-weight:900"><span style="position:absolute;left:-2px;top:0;color:#ff0000;opacity:0.6">DEPTH</span><span style="position:absolute;left:2px;top:0;color:#00ffff;opacity:0.6">DEPTH</span><span style="color:#1a1a2e;position:relative">DEPTH</span></div>`, prompt: `Create an anaglyph 3D effect — offset red and cyan copies of an image or text to create a stereoscopic illusion (viewable with red-cyan 3D glasses). Use two duplicate layers: one tinted red (left-shifted), one tinted cyan (right-shifted). Use for retro-futuristic themes, movie promotions, or nostalgic design.` },
    { name: "Generative / Algorithmic Art", aka: "Procedural graphics, Code art", css: `<svg width="80" height="50" viewBox="0 0 80 50"><rect width="80" height="50" rx="8" fill="#f3f4f6"/><line x1="10" y1="45" x2="15" y2="15" stroke="#7c5cfc" stroke-width="0.5" opacity="0.6"/><line x1="15" y1="15" x2="25" y2="35" stroke="#7c5cfc" stroke-width="0.5" opacity="0.6"/><line x1="25" y1="35" x2="35" y2="10" stroke="#fc5c8c" stroke-width="0.5" opacity="0.6"/><line x1="35" y1="10" x2="45" y2="40" stroke="#fc5c8c" stroke-width="0.5" opacity="0.6"/><line x1="45" y1="40" x2="55" y2="8" stroke="#5cfcb6" stroke-width="0.5" opacity="0.6"/><line x1="55" y1="8" x2="65" y2="30" stroke="#5cfcb6" stroke-width="0.5" opacity="0.6"/><line x1="65" y1="30" x2="75" y2="12" stroke="#fcac5c" stroke-width="0.5" opacity="0.6"/><circle cx="15" cy="15" r="2" fill="#7c5cfc" opacity="0.8"/><circle cx="35" cy="10" r="2" fill="#fc5c8c" opacity="0.8"/><circle cx="55" cy="8" r="2" fill="#5cfcb6" opacity="0.8"/></svg>`, prompt: `Create generative/algorithmic art — visuals produced by code using mathematical rules, randomness, and parameters. Use libraries like p5.js, Three.js, or SVG manipulation. Techniques: Perlin noise fields, recursive fractals, particle systems, flow fields, Voronoi diagrams. Each render is unique. Use for NFT art, creative coding portfolios, or unique brand identities.` },
    { name: "Kinetic Typography", aka: "Moving text, Animated words", css: `<div style="width:80px;height:40px;display:flex;align-items:center;justify-content:center;overflow:hidden"><div style="display:flex;gap:2px"><span style="font-size:14px;font-weight:800;color:#7c5cfc;animation:kinetic1 2s ease-in-out infinite">M</span><span style="font-size:14px;font-weight:800;color:#fc5c8c;animation:kinetic1 2s ease-in-out 0.1s infinite">O</span><span style="font-size:14px;font-weight:800;color:#5cfcb6;animation:kinetic1 2s ease-in-out 0.2s infinite">V</span><span style="font-size:14px;font-weight:800;color:#fcac5c;animation:kinetic1 2s ease-in-out 0.3s infinite">E</span></div></div><style>@keyframes kinetic1{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-4px) rotate(-3deg)}75%{transform:translateY(2px) rotate(2deg)}}</style>`, prompt: `Create kinetic typography — animated text where individual letters, words, or lines move independently. Letters can bounce, scale, rotate, wave, or reveal sequentially. Use for hero headlines, music videos, social media content, or expressive landing pages. Each letter gets its own animation with staggered delays for wave effects.` },
    { name: "Noise Mesh / Grain Gradient", aka: "Textured gradient, Dithered blend", css: `<div style="width:80px;height:50px;border-radius:8px;position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(135deg,#7c5cfc,#fc5c8c,#fcac5c)"></div><svg width="100%" height="100%" style="position:absolute;inset:0;mix-blend-mode:overlay"><filter id="noiseMesh"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#noiseMesh)" opacity="0.4"/></svg></div>`, prompt: `Create a noise mesh gradient — a colorful gradient with heavy grain texture overlay using mix-blend-mode: overlay. The grain adds an analog, risograph-printed quality. Use higher grain opacity than subtle noise (30-50%). Popular in editorial design, album art, and creative branding. The grain breaks up the digital smoothness and adds warmth.` },
    { name: "Wireframe Aesthetic", aka: "Blueprint, Architectural lines", css: `<div style="width:80px;height:50px;border-radius:8px;background:#f3f4f6;position:relative;overflow:hidden"><div style="position:absolute;inset:4px;border:1px solid rgba(124,92,252,0.4);border-radius:4px"></div><div style="position:absolute;top:8px;left:20px;width:20px;height:20px;border:1px solid rgba(124,92,252,0.5);border-radius:50%"></div><line style="position:absolute;top:15px;left:42px;width:30px;height:1px;background:rgba(124,92,252,0.4)"></div><div style="position:absolute;bottom:8px;left:30px;width:24px;height:14px;border:1px solid rgba(124,92,252,0.4);border-radius:2px"></div></div>`, prompt: `Create a wireframe/blueprint aesthetic — all elements rendered as thin outlines on a dark background with no fills. Use cyan, teal, or green line colors reminiscent of technical drawings or architectural blueprints. Include grid lines in the background. Use for tech/engineering brands, loading states that reveal wireframe-to-final, or developer-focused design.` },
    { name: "Data Moshing", aka: "Compression artifact, Digital corruption", css: `<div style="width:80px;height:50px;border-radius:8px;position:relative;overflow:hidden;background:linear-gradient(135deg,#7c5cfc,#fc5c8c)"><div style="position:absolute;top:12px;left:0;right:0;height:8px;background:linear-gradient(90deg,#5cfcb6,#fcac5c,#7c5cfc);transform:skewX(-20deg);opacity:0.6"></div><div style="position:absolute;top:28px;left:0;right:0;height:5px;background:linear-gradient(90deg,#fc5c8c,#5cfcb6,#fcac5c);transform:skewX(15deg);opacity:0.4"></div><div style="position:absolute;top:20px;left:10px;width:25px;height:10px;background:rgba(0,255,0,0.15)"></div></div>`, prompt: `Create a data moshing/glitch art effect — simulate video compression artifacts with horizontal color banding, skewed rectangular blocks, color channel bleeding, and blocky macro-artifacts. More aggressive than simple glitch text. Use for experimental art, music visuals, fashion/streetwear brands, or creating a sense of digital decay and disruption.` },
    { name: "ASCII / Text Art", aka: "Character art, Terminal art", css: `<div style="width:80px;height:46px;background:#0a0a14;border-radius:6px;padding:4px 6px;font-family:monospace;font-size:7px;line-height:1.1;color:#5cfcb6;overflow:hidden">╔══════╗<br>║ ◈ ◈  ║<br>║  ──  ║<br>╚══════╝</div>`, prompt: `Create ASCII art — images and designs composed entirely of text characters (letters, numbers, symbols). Use monospace fonts. Can range from simple box drawings (╔═╗║╚═╝) to complex character-based portraits. Use for terminal/CLI aesthetics, hacker themes, retro interfaces, or creative text-based branding.` },
    { name: "Maximalism", aka: "More is more, Anti-minimalism", css: `<div style="width:80px;height:50px;border-radius:4px;position:relative;overflow:hidden;background:linear-gradient(135deg,#ff0080,#7c5cfc,#00ff80)"><div style="position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fcac5c;border-radius:50%;border:2px solid #fff"></div><div style="position:absolute;bottom:2px;right:2px;font-size:16px;font-weight:900;color:#fff;text-shadow:2px 2px 0 #000">MAX</div><div style="position:absolute;top:5px;right:5px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:16px solid #fff"></div><div style="position:absolute;bottom:5px;left:25px;width:12px;height:12px;background:#ff0;border:2px solid #000"></div></div>`, prompt: `Create a maximalist design — the opposite of minimalism. Layer patterns, bold colors, mixed typography, clashing textures, and dense visual information. More is more. Break grid rules, combine competing elements, and create visual overload (intentionally). Use for fashion, music festivals, editorial spreads, or brands that want to feel bold and excessive.` },
    { name: "Frosted Acrylic", aka: "Windows Acrylic, Mica material", css: `<div style="width:70px;height:46px;border-radius:8px;background:rgba(30,30,46,0.7);backdrop-filter:blur(30px) saturate(1.2);border:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.04),transparent)"></div><svg width="100%" height="100%" style="position:absolute;inset:0"><filter id="acrylic"><feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#acrylic)" opacity="0.03"/></svg></div>`, prompt: `Create a frosted acrylic material (Windows Fluent Design style) — similar to glassmorphism but with a visible noise/luminosity texture layer (acrylic noise), very high blur (30-60px), and a more opaque tinted base. Less transparent than liquid glass, more like looking through frosted plastic. Include the subtle luminosity noise overlay that distinguishes acrylic from plain blur. Use for sidebars, navigation panels, or app chrome.` },
