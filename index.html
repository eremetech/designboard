    { name: "Gradient Border Glow", aka: "Animated border glow, Rainbow edge", css: `<div style="width:64px;height:40px;border-radius:10px;background:conic-gradient(from 0deg,#7c5cfc,#fc5c8c,#5cfcb6,#fcac5c,#7c5cfc);padding:2px;animation:borderSpin 3s linear infinite;position:relative"><div style="width:100%;height:100%;background:#13131a;border-radius:8px"></div></div><style>@keyframes borderSpin{to{filter:hue-rotate(360deg)}}</style>`, prompt: `Create an animated gradient border glow — a rotating conic gradient used as a border that cycles through colors continuously. The card's background sits inside, creating a glowing animated edge. Use filter: hue-rotate() animation for continuous color cycling. Use for featured cards, premium subscriptions, AI-generated content indicators, or attention-grabbing CTAs.` },
    { name: "Dynamic Island", aka: "Adaptive island, Floating status", css: `<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:50px;height:14px;background:#000;border-radius:7px;display:flex;align-items:center;justify-content:center;gap:3px;transition:all 0.5s cubic-bezier(0.4,0,0.2,1)"><div style="width:6px;height:6px;background:#5cfcb6;border-radius:50%"></div><div style="font-size:6px;color:#fff;font-weight:600">Playing...</div></div></div>`, prompt: `Create a Dynamic Island-style UI element (Apple iPhone style) — a pill-shaped floating container that morphs size and shape to display contextual information. Starts as a small pill, expands smoothly to show media controls, timers, directions, etc. Use CSS transitions with cubic-bezier easing for the fluid morphing. The island shape-shifts between compact and expanded states. Use for notification systems, status indicators, or contextual mini-UIs.` },
    { name: "Rive / Lottie Animation", aka: "Vector animation, Interactive motion", css: `<div style="width:80px;height:50px;border-radius:8px;background:#1a1a24;border:1px dashed #2a2a3a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px"><svg width="20" height="20" viewBox="0 0 20 20"><polygon points="8,4 8,16 16,10" fill="#7c5cfc"/></svg><div style="font-size:7px;color:#555">.json / .riv</div></div>`, prompt: `Use Lottie or Rive for complex animations — vector-based animation files that are lightweight, scalable, and interactive. Lottie plays After Effects animations as JSON. Rive adds interactivity and state machines. Use for: onboarding illustrations, animated icons, loading states, interactive mascots, or hero animations. These replace heavy GIFs/videos with tiny, crisp vector animations.` },
    { name: "Scroll-Triggered Animation", aka: "Scroll reveal, Intersection observer", css: `<div style="width:80px;height:44px;border-radius:8px;background:#1a1a24;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden"><div style="display:flex;gap:3px"><div style="width:14px;height:14px;background:#7c5cfc;border-radius:4px;opacity:1"></div><div style="width:14px;height:14px;background:#fc5c8c;border-radius:4px;opacity:0.6;transform:translateY(4px)"></div><div style="width:14px;height:14px;background:#5cfcb6;border-radius:4px;opacity:0.3;transform:translateY(8px)"></div></div><div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:16px;color:#2a2a3a">↓</div></div>`, prompt: `Create scroll-triggered animations — elements that animate into view as the user scrolls down the page. Use Intersection Observer API to detect when elements enter the viewport, then trigger CSS animations (fade-up, slide-in, scale-in). Stagger child elements for cascade effects. Libraries: GSAP ScrollTrigger, Framer Motion, AOS. The modern standard for landing page polish.` },
    { name: "Mesh Gradient (True)", aka: "Multi-point gradient, Figma mesh", css: `<div style="width:80px;height:50px;border-radius:8px;position:relative;overflow:hidden;background:#f3f4f6"><div style="position:absolute;top:-10px;left:-10px;width:45px;height:45px;background:rgba(124,92,252,0.5);border-radius:50%;filter:blur(20px)"></div><div style="position:absolute;bottom:-15px;right:-10px;width:50px;height:50px;background:rgba(252,92,140,0.4);border-radius:50%;filter:blur(22px)"></div><div style="position:absolute;top:5px;right:10px;width:35px;height:35px;background:rgba(92,252,182,0.3);border-radius:50%;filter:blur(18px)"></div><div style="position:absolute;bottom:0;left:20px;width:30px;height:30px;background:rgba(252,172,92,0.25);border-radius:50%;filter:blur(16px)"></div></div>`, prompt: `Create a true mesh gradient — multiple color points that blend organically in 2D space (unlike linear/radial which follow fixed paths). In CSS, simulate with overlapping blurred circles. In Figma, use the mesh gradient plugin. In tools like meshgradient.com, generate SVG mesh gradients. Each color point influences its surrounding area. The dominant background trend for modern SaaS, AI products, and creative sites.` },
    { name: "Morphing SVG", aka: "Shape animation, Path morph", css: `<svg width="60" height="50" viewBox="0 0 60 50"><path fill="#7c5cfc" opacity="0.6"><animate attributeName="d" dur="4s" repeatCount="indefinite" values="M15,25 Q30,5 45,25 Q30,45 15,25;M10,20 Q30,10 50,20 Q30,40 10,20;M15,25 Q30,5 45,25 Q30,45 15,25"/></path></svg>`, prompt: `Create morphing SVG shapes — one shape smoothly transforms into another by animating the SVG path data (d attribute). Both shapes must have the same number of path points. Use SMIL animation, CSS, or libraries like Flubber/GSAP MorphSVG. Use for logo animations, decorative blobs, loading states, or transitions between icons.` },
    { name: "Scroll-Linked Video", aka: "Scrub video, Apple-style scroll", css: `<div style="width:80px;height:50px;border-radius:8px;background:#0a0a14;display:flex;align-items:center;justify-content:center;position:relative"><div style="width:40px;height:40px;background:linear-gradient(135deg,#2a2a3a,#1a1a24);border-radius:8px;transform:perspective(200px) rotateY(-10deg)"></div><div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:2px"><div style="height:2px;width:20px;background:#7c5cfc;border-radius:1px"></div><div style="height:2px;width:20px;background:#2a2a3a;border-radius:1px"></div></div></div>`, prompt: `Create scroll-linked animations (Apple product page style) — video or animation playback controlled by scroll position. As user scrolls, a product rotates, explodes into parts, or transitions between features. Use CSS scroll-timeline, GSAP ScrollTrigger with video scrubbing, or frame-sequence images. The pinnacle of landing page storytelling — scroll becomes the playhead.` },
    { name: "Glowing Orbs / Auras", aka: "Ambient light, Neon blur", css: `<div style="width:80px;height:50px;background:#0a0a0f;border-radius:8px;position:relative;overflow:hidden"><div style="position:absolute;top:-20px;left:-20px;width:60px;height:60px;background:radial-gradient(circle, rgba(124,92,252,0.6) 0%, transparent 70%);filter:blur(10px)"></div><div style="position:absolute;bottom:-10px;right:-10px;width:40px;height:40px;background:radial-gradient(circle, rgba(92,252,182,0.5) 0%, transparent 70%);filter:blur(8px)"></div></div>`, prompt: `Create glowing orbs/auras — large, heavily blurred radial gradients placed in the background of dark mode interfaces. They create a sense of deep, ambient lighting and high-tech energy. Essential for modern AI and Web3 landing pages.` },
    { name: "Chromatic Aberration", aka: "RGB split, Color fringing", css: `<div style="width:80px;height:50px;background:#1a1a24;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative"><div style="font-size:14px;font-weight:900;color:#fff;position:absolute">GLITCH</div><div style="font-size:14px;font-weight:900;color:#ff00ff;position:absolute;transform:translate(-2px, 0);mix-blend-mode:screen;opacity:0.7">GLITCH</div><div style="font-size:14px;font-weight:900;color:#00ffff;position:absolute;transform:translate(2px, 0);mix-blend-mode:screen;opacity:0.7">GLITCH</div></div>`, prompt: `Create a chromatic aberration effect — simulate a flawed camera lens by splitting an element into its red, green, and blue channels and slightly offsetting them. Creates a subtle glitchy, high-tech, or cinematic feel. Use sparingly on typography or image edges.` },
    { name: "Bubbly / Blobby UI", aka: "Soft UI, Organic shapes", css: `<div style="width:80px;height:50px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:4px"><div style="width:24px;height:24px;background:#7c5cfc;border-radius:40% 60% 70% 30% / 40% 50% 60% 50%"></div><div style="width:30px;height:20px;background:#fc5c8c;border-radius:20px"></div></div>`, prompt: `Design with Bubbly/Blobby UI — use extreme border-radii, organic blob shapes instead of strict rectangles, and soft, friendly colors. Everything feels inflated, soft, and approachable. A reaction against strict, sharp-edged corporate design.` }
  ]
},

// ─── TEXTURE & MATERIAL EFFECTS ───
{
  section: "Texture & Material Simulation",
  desc: "Advanced material effects that simulate physical surfaces and substances.",
  items: [
    { name: "Liquid / Fluid", aka: "Melting, Lava lamp, Organic flow", css: `<div style="width:80px;height:50px;border-radius:8px;background:#0a0a14;position:relative;overflow:hidden"><div style="position:absolute;top:5px;left:10px;width:28px;height:28px;background:rgba(124,92,252,0.5);border-radius:60% 40% 50% 50%/50% 60% 40% 50%;animation:liquidMorph 4s ease-in-out infinite"></div><div style="position:absolute;bottom:5px;right:8px;width:22px;height:22px;background:rgba(252,92,140,0.4);border-radius:40% 60% 50% 50%/60% 40% 50% 50%;animation:liquidMorph 5s ease-in-out 1s infinite"></div></div><style>@keyframes liquidMorph{0%,100%{border-radius:60% 40% 50% 50%/50% 60% 40% 50%}50%{border-radius:40% 60% 40% 60%/60% 40% 60% 40%}}</style>`, prompt: `Create a liquid/fluid effect — organic blobs that morph, merge, and split like a lava lamp. Use animated border-radius values on colored shapes, or SVG with feMorphology filters. CSS approach: animate border-radius between different asymmetric values. Use for creative backgrounds, loading states, or avant-garde hero sections.` },
    { name: "Frosted Glass (Layered)", aka: "Multi-layer blur, Depth glass", css: `<div style="width:80px;height:50px;position:relative;border-radius:8px;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(135deg,#7c5cfc,#fc5c8c)"></div><div style="position:absolute;bottom:0;left:5px;width:35px;height:30px;background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);border-radius:6px;border:1px solid rgba(255,255,255,0.1)"></div><div style="position:absolute;top:5px;right:3px;width:30px;height:25px;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border-radius:6px;border:1px solid rgba(255,255,255,0.15)"></div></div>`, prompt: `Create layered frosted glass — multiple glass panels at different depths with varying blur amounts. Panels closer to the viewer have higher blur and more opacity. Creates a rich, multi-dimensional composition. Use for complex dashboard overlays, creative hero sections, or multi-panel UI designs.` },
    { name: "Rubber / Silicone", aka: "Soft material, Inflatable", css: `<div style="width:50px;height:50px;background:linear-gradient(145deg,#fc5c8c,#e04070);border-radius:16px;box-shadow:inset 0 4px 8px rgba(255,255,255,0.2),inset 0 -4px 8px rgba(0,0,0,0.2),0 6px 16px rgba(224,64,112,0.3)"></div>`, prompt: `Create a rubber/silicone material effect — soft, matte surface with diffused highlights and shadows. Use inner shadows for the concave/convex surface, and a colored external shadow. Higher border-radius for a puffy feel. The surface should feel squeezable and tactile. Use for playful brands, toy aesthetics, or soft-touch UI elements.` },
    { name: "Ice / Crystal", aka: "Frozen, Translucent ice", css: `<div style="width:60px;height:40px;border-radius:6px;background:linear-gradient(135deg,rgba(200,230,255,0.6),rgba(180,220,255,0.3),rgba(200,230,255,0.5));backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.8);box-shadow:inset 0 1px 2px rgba(255,255,255,0.8),0 2px 8px rgba(100,180,255,0.2)"></div>`, prompt: `Create an ice/crystal effect — translucent, cool-blue tinted surface with sharp specular highlights and refraction hints. Use light blue gradients with white highlight spots, thin bright borders, and subtle inner glow. Can add fracture lines for cracked ice. Use for winter themes, cold beverage brands, or fantasy/gaming frost elements.` },
    { name: "Velvet / Suede", aka: "Soft fabric, Plush texture", css: `<div style="width:60px;height:40px;border-radius:8px;background:linear-gradient(135deg,#3a1550,#5a2570,#4a1a60);position:relative;overflow:hidden"><svg width="100%" height="100%" style="position:absolute;inset:0"><filter id="velvet"><feTurbulence type="fractalNoise" baseFrequency="2" numOctaves="6" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#velvet)" opacity="0.06"/></svg></div>`, prompt: `Create a velvet/suede texture — deep, rich color with very fine grain and a subtle directional sheen. The surface should feel soft and plush. Use high-frequency noise at very low opacity over a deep saturated color. Add a slight gradient suggesting the nap direction. Use for luxury brands, fashion, or premium product backgrounds.` },
    { name: "Neon Sign", aka: "Glowing tube, Electric lettering", css: `<div style="font-size:18px;font-weight:300;color:#ff5cac;text-shadow:0 0 4px #ff5cac,0 0 12px #ff5cac,0 0 24px rgba(255,92,172,0.4),0 0 48px rgba(255,92,172,0.2);font-family:cursive">Open</div>`, prompt: `Create a neon sign effect — glowing text or shapes that look like bent neon tube lighting. Use multiple layered text-shadows or box-shadows in the element's color at increasing blur radii. The innermost glow is brightest, outer glows are softer. Use a thin or script font for authenticity. Add a subtle flicker animation. Use for nightlife, restaurant, or retro-themed designs.` },
    { name: "Glassmorphic Button", aka: "Transparent CTA, Glass button", css: `<div style="padding:6px 16px;border-radius:10px;background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);color:#fff;font-size:11px;font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 2px 8px rgba(0,0,0,0.1)">Glass CTA</div>`, prompt: `Create a glassmorphic button — a CTA with frosted glass material: semi-transparent background, backdrop blur, thin luminous border, and a highlight line at the top edge. Should feel elevated and premium. Hover state: increase background opacity slightly and enhance the glow. Use for hero CTAs over gradient/image backgrounds.` },
    { name: "Embossed / Stamped", aka: "Raised impression, Blind deboss", css: `<div style="width:70px;height:40px;background:#d4c8b8;border-radius:6px;display:flex;align-items:center;justify-content:center"><div style="font-size:10px;font-weight:800;color:transparent;text-shadow:1px 1px 1px rgba(255,255,255,0.6),-1px -1px 1px rgba(0,0,0,0.15);-webkit-text-stroke:0.5px rgba(0,0,0,0.05)">PREMIUM</div></div>`, prompt: `Create an embossed/blind-stamped effect — text or shapes that appear pressed into or raised from a paper/leather surface with no ink. Use opposing light/dark shadows on a background-matching color. The element is defined only by its shadows, not its color. Use for luxury stationery, premium packaging mockups, or elegant watermarks.` },
    { name: "Leather", aka: "Hide, Stitched texture", css: `<div style="width:60px;height:40px;border-radius:4px;background:#5c3a21;position:relative;box-shadow:inset 0 0 10px rgba(0,0,0,0.5)"><div style="position:absolute;inset:3px;border:1px dashed rgba(255,255,255,0.3);border-radius:2px"></div><svg width="100%" height="100%" style="position:absolute;inset:0"><filter id="leather"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(#leather)" opacity="0.1" mix-blend-mode="multiply"/></svg></div>`, prompt: `Create a leather texture — rich brown/black base with a subtle, bumpy noise filter and an inner shadow for depth. Add a dashed border just inside the edge to simulate stitching. Classic skeuomorphic material for premium, classic, or automotive themes.` },
    { name: "Holographic Foil", aka: "Iridescent paper, Shiny foil", css: `<div style="width:60px;height:40px;border-radius:4px;background:linear-gradient(135deg, #ff9a9e 0%, #fecfef 20%, #a1c4fd 40%, #c2e9fb 60%, #d4fc79 80%, #96e6a1 100%);box-shadow:inset 0 1px 3px rgba(255,255,255,0.8), 0 2px 5px rgba(0,0,0,0.1);position:relative;overflow:hidden"><div style="position:absolute;inset:0;background:linear-gradient(45deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 70%);transform:translateX(-20%)"></div></div>`, prompt: `Create a holographic foil material — bright, pastel rainbow gradients with a sharp, diagonal white highlight sweeping across it. Simulates shiny, iridescent trading cards or premium packaging. Very popular in modern streetwear and beauty branding.` },
    { name: "Knitted Sweater", aka: "Wool texture, Winter knit", css: `<div style="width:60px;height:40px;border-radius:4px;background-color:#c44536;background-image:radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, transparent 60%);background-size:8px 8px;position:relative"><div style="position:absolute;inset:0;background-image:repeating-linear-gradient(90deg, transparent 0, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);background-size:8px 100%"></div></div>`, prompt: `Create a knitted sweater texture — a repeating pattern of small V-shapes or interlocking loops, usually in warm, cozy colors. Use for winter promotions, holiday themes, or brands emphasizing comfort and warmth.` }
  ]
},

// ─── SOCIAL & MARKETING DESIGN ───
{
  section: "Social & Marketing Design",
  desc: "Design patterns specific to social media, advertising, and marketing materials.",
  items: [
    { name: "Story / Reel Format", aka: "9:16 vertical, Full-screen mobile", css: `<div style="width:28px;height:50px;background:linear-gradient(180deg,#7c5cfc,#fc5c8c);border-radius:6px;position:relative"><div style="position:absolute;top:3px;left:3px;width:8px;height:8px;background:rgba(255,255,255,0.2);border-radius:50%"></div><div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:5px;color:#fff;white-space:nowrap;font-weight:600">Swipe up</div></div>`, prompt: `Design for story/reel format (9:16 vertical, 1080×1920). Full-screen mobile canvas. Key elements: user avatar top-left, brand text safe within center 80%, swipe-up CTA at bottom, progress bar at top. Design for 3-5 second attention spans. Use bold text, high contrast, and motion. The dominant social media format.` },
    { name: "Social Card / OG Image", aka: "Link preview, Share card", css: `<div style="width:80px;height:42px;border-radius:6px;overflow:hidden;border:1px solid #2a2a3a"><div style="height:26px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c)"></div><div style="padding:3px 5px;background:#1e1e2e"><div style="height:3px;width:50px;background:#3a3a4a;border-radius:1px;margin-bottom:2px"></div><div style="height:2px;width:35px;background:#2a2a3a;border-radius:1px"></div></div></div>`, prompt: `Design a social card / OG image (1200×630px) — the preview that appears when sharing a link on social media. Include: bold title text, brand logo, vibrant background, optional subtitle. Keep text within the center safe zone (text may be cropped on different platforms). High contrast, readable at small sizes. This image represents your content across Twitter, Facebook, LinkedIn, Slack.` },
    { name: "Banner Ad Sizes", aka: "Display ad, Web ad units", css: `<div style="display:flex;gap:3px;align-items:end"><div style="width:38px;height:10px;background:linear-gradient(90deg,#7c5cfc,#fc5c8c);border-radius:2px;font-size:5px;color:#fff;display:flex;align-items:center;justify-content:center">728×90</div><div style="width:16px;height:32px;background:linear-gradient(180deg,#7c5cfc,#fc5c8c);border-radius:2px;font-size:5px;color:#fff;display:flex;align-items:center;justify-content:center;writing-mode:vertical-lr">160×600</div><div style="width:18px;height:15px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c);border-radius:2px;font-size:5px;color:#fff;display:flex;align-items:center;justify-content:center">300×250</div></div>`, prompt: `Design for standard banner ad sizes: Leaderboard (728×90), Medium Rectangle (300×250), Skyscraper (160×600), Large Rectangle (336×280), Mobile Banner (320×50). Each size needs: headline, visual, CTA button, logo. Design with clear hierarchy — the CTA must be instantly visible. Keep copy under 5 words per line. Follow IAB guidelines.` },
    { name: "Email Header", aka: "Newsletter hero, Email banner", css: `<div style="width:80px;height:30px;background:linear-gradient(135deg,#7c5cfc,#fc5c8c);border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center"><div style="font-size:9px;font-weight:700;color:#fff">Newsletter</div></div>`, prompt: `Design an email header/hero — the top section of a marketing email (600px max width standard). Must work without images (many clients block them). Include brand logo, headline, and CTA. Use inline CSS (no external stylesheets). Test across Gmail, Outlook, Apple Mail. Keep important content within 600px width and above the 300px fold line.` },
    { name: "Testimonial Card", aka: "Review card, Quote card", css: `<div style="width:80px;padding:6px;background:#1e1e2e;border-radius:8px;border:1px solid #2a2a3a"><div style="font-size:14px;color:#fcac5c;line-height:1">★★★★★</div><div style="font-size:7px;color:#888;margin:3px 0;font-style:italic;line-height:1.2">"Amazing product..."</div><div style="display:flex;align-items:center;gap:3px"><div style="width:10px;height:10px;background:#7c5cfc;border-radius:50%"></div><div style="font-size:6px;color:#666">Jane D.</div></div></div>`, prompt: `Design a testimonial/review card — star rating (filled stars), quoted review text in italics, reviewer name and photo/avatar, optionally their role/company. Use large quotation marks or a left border accent. Social proof that builds trust. Place near CTAs and pricing for maximum conversion impact.` },
    { name: "Pricing Table", aka: "Plan comparison, Tier cards", css: `<div style="display:flex;gap:3px"><div style="width:24px;height:44px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a;padding:3px;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:5px;color:#888">Basic</div><div style="font-size:8px;font-weight:800;color:#fff">$9</div><div style="font-size:5px;color:#555">/ mo</div></div><div style="width:28px;height:48px;background:#1e1e2e;border-radius:5px;border:2px solid #7c5cfc;padding:3px;display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:-4px"><div style="font-size:4px;color:#7c5cfc;font-weight:700">POPULAR</div><div style="font-size:5px;color:#888">Pro</div><div style="font-size:8px;font-weight:800;color:#fff">$29</div><div style="font-size:5px;color:#555">/ mo</div></div><div style="width:24px;height:44px;background:#1e1e2e;border-radius:5px;border:1px solid #2a2a3a;padding:3px;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:5px;color:#888">Team</div><div style="font-size:8px;font-weight:800;color:#fff">$79</div><div style="font-size:5px;color:#555">/ mo</div></div></div>`, prompt: `Design a pricing table — 2-4 plan cards side by side. Highlighted/recommended plan is taller, has a colored border, and a "Most Popular" badge. Each card: plan name, price, billing period, feature list with checkmarks, and CTA button. Use the Von Restorff effect to make the preferred plan stand out. Anchor with the highest price visible.` },

// APP LOGIC
// ════════════════════════════════════════════════════════════════
const app = document.getElementById('app');
const searchBox = document.getElementById('searchBox');
const filterPills = document.getElementById('filterPills');
const filterWrapper = document.getElementById('filterWrapper');
const toggleFiltersBtn = document.getElementById('toggleFilters');
const filterArrow = document.getElementById('filterArrow');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalAka = document.getElementById('modalAka');
const modalPrompt = document.getElementById('modalPrompt');
const modalClose = document.getElementById('modalClose');

let activeFilter = 'All';

// ── Collapsible filter bar ──
toggleFiltersBtn.addEventListener('click', () => {
  filterWrapper.classList.toggle('open');
  filterArrow.classList.toggle('open');
});

// Build filter pills
const sections = ['All', ...DATA.map(s => s.section)];
sections.forEach(s => {
  const pill = document.createElement('button');
  pill.className = 'pill' + (s === 'All' ? ' active' : '');
  pill.textContent = s;
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = s;
    render();
  });
  filterPills.appendChild(pill);
});

function render() {
  const query = searchBox.value.toLowerCase().trim();
  app.innerHTML = '';

  DATA.forEach(section => {
    if (activeFilter !== 'All' && section.section !== activeFilter) return;

    const filtered = section.items.filter(item => {
      if (!query) return true;
      return item.name.toLowerCase().includes(query) ||
             item.aka.toLowerCase().includes(query) ||
             item.prompt.toLowerCase().includes(query) ||
             section.section.toLowerCase().includes(query);
    });

    if (filtered.length === 0) return;

    const sec = document.createElement('div');
    sec.className = 'section';

    // Add "Select Colors" button for Color Theory section
    const extraBtn = section.section === 'Color Theory & Harmony'
      ? `<button class="prompt-btn select-colors-btn" style="width:auto;padding:6px 16px;margin-left:auto;" onclick="openColorPicker()">Select Colors</button>`
      : '';

    sec.innerHTML = `
      <div class="section-header">
        <h2>${section.section}</h2>
        <span>${section.desc}</span>
        ${extraBtn}
      </div>
      <div class="grid"></div>
    `;

    const grid = sec.querySelector('.grid');
    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-preview">${item.css}</div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-aka">${item.aka}</div>
          <button class="prompt-btn">Show Prompt</button>
        </div>
      `;
      card.querySelector('.prompt-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(item);
      });
      grid.appendChild(card);
    });

    app.appendChild(sec);
  });
}

function htmlToTsx(html, componentName) {
  let tsx = html;
  
  // Replace class= with className=
  tsx = tsx.replace(/class=/g, 'className=');
  
  // Replace style="..." with style={{...}}
  tsx = tsx.replace(/style="([^"]*)"/g, (match, styleString) => {
    const styles = styleString.split(';').filter(s => s.trim() !== '');
    const styleObj = styles.map(s => {
      const [key, ...valueParts] = s.split(':');
      const value = valueParts.join(':').trim();
      const camelKey = key.trim().replace(/-([a-z])/g, (g) => g[1].toUpperCase());
      return `${camelKey}: '${value.replace(/'/g, "\\'")}'`;
    }).join(', ');
    return `style={{ ${styleObj} }}`;
  });

  // SVG attributes that need camelCasing in React
  const svgAttrs = [
    'stroke-width', 'stroke-linecap', 'stroke-linejoin', 'stroke-dasharray',
    'stroke-dashoffset', 'fill-rule', 'clip-rule', 'clip-path', 'stop-color',
    'stop-opacity', 'baseFrequency', 'numOctaves', 'stitchTiles', 'color-interpolation-filters'
  ];
  
  svgAttrs.forEach(attr => {
    const camelAttr = attr.replace(/-([a-zA-Z])/g, (g) => g[1].toUpperCase());
    const regex = new RegExp(`${attr}=`, 'g');
    tsx = tsx.replace(regex, `${camelAttr}=`);
  });
  
  // Fix specific SVG attributes that might be lowercase in HTML but need camelCase in React
  tsx = tsx.replace(/viewbox=/g, 'viewBox=');
  tsx = tsx.replace(/basefrequency=/g, 'baseFrequency=');
  tsx = tsx.replace(/numoctaves=/g, 'numOctaves=');
  tsx = tsx.replace(/stitchtiles=/g, 'stitchTiles=');

  const name = componentName.replace(/[^a-zA-Z0-9]/g, '') || 'Component';
  return `export const ${name} = () => {\n  return (\n    ${tsx}\n  );\n};`;
}

function openModal(item) {
  modalTitle.textContent = item.name;
  modalAka.textContent = `Also known as: ${item.aka}`;
  
  // Setup Textual Prompt
  const textNode = document.createTextNode(item.prompt);
  modalPrompt.innerHTML = '';
  modalPrompt.appendChild(textNode);
  
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = 'Copy';
  btn.addEventListener('click', () => {
    navigator.clipboard.writeText(item.prompt).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  });
  modalPrompt.appendChild(btn);

  // Setup Tech Prompt
  const htmlCode = `<!-- High-quality HTML/CSS implementation for ${item.name} -->\n${item.css}`;
  const tsxCode = `// High-quality React (TSX) implementation for ${item.name}\n${htmlToTsx(item.css, item.name)}`;
  
  const modalTechPrompt = document.getElementById('modalTechPrompt');
  
  // Function to update tech prompt content
  const updateTechPrompt = (type) => {
    const code = type === 'html' ? htmlCode : tsxCode;
    modalTechPrompt.innerHTML = '';
    const codeNode = document.createTextNode(code);
    modalTechPrompt.appendChild(codeNode);
    
    const techBtn = document.createElement('button');
    techBtn.className = 'copy-btn';
    techBtn.textContent = 'Copy';
    techBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(code).then(() => {
        techBtn.textContent = 'Copied!';
        setTimeout(() => techBtn.textContent = 'Copy', 1500);
      });
    });
    modalTechPrompt.appendChild(techBtn);
  };

  // Initial tech prompt state
  updateTechPrompt('html');

  // Setup Tabs logic
  const modalTabs = document.querySelectorAll('.modal-tab');
  const tabContents = document.querySelectorAll('.tab-content');
  
  modalTabs.forEach(tab => {
    // Remove old event listeners by cloning (simple way to avoid duplicates if openModal is called multiple times)
    const newTab = tab.cloneNode(true);
    tab.parentNode.replaceChild(newTab, tab);
    
    newTab.addEventListener('click', () => {
      document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
      tabContents.forEach(c => c.classList.remove('active'));
      
      newTab.classList.add('active');
      document.getElementById(`tab-${newTab.dataset.tab}`).classList.add('active');
    });
  });
  
  // Reset to textual tab by default when opening modal
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  tabContents.forEach(c => c.classList.remove('active'));
  document.querySelector('.modal-tab[data-tab="textual"]').classList.add('active');
  document.getElementById('tab-textual').classList.add('active');

  // Setup Tech Tabs logic
  const techTabs = document.querySelectorAll('.tech-tab');
  techTabs.forEach(tab => {
    const newTab = tab.cloneNode(true);
    tab.parentNode.replaceChild(newTab, tab);
    
    newTab.addEventListener('click', () => {
      document.querySelectorAll('.tech-tab').forEach(t => t.classList.remove('active'));
      newTab.classList.add('active');
      updateTechPrompt(newTab.dataset.tech);
    });
  });
  
  // Reset to HTML tab by default
  document.querySelectorAll('.tech-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tech-tab[data-tech="html"]').classList.add('active');

  modal.classList.add('open');
}

modalClose.addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.classList.remove('open');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    modal.classList.remove('open');
    document.getElementById('colorPickerOverlay').classList.remove('open');
  }
});

searchBox.addEventListener('input', render);
render();

// Count total
const total = DATA.reduce((sum, s) => sum + s.items.length, 0);
document.querySelector('.hero p').textContent += ` ${total} elements across ${DATA.length} categories.`;

// COLOR PICKER / HARMONY TOOL
// ════════════════════════════════════════════════════════════════
const colorPickerOverlay = document.getElementById('colorPickerOverlay');
const colorPickerClose = document.getElementById('colorPickerClose');
const harmonySelector = document.getElementById('harmonySelector');
const colorWheelCanvas = document.getElementById('colorWheel');
const slPickerCanvas = document.getElementById('slPicker');
const paletteOutput = document.getElementById('paletteOutput');

const harmonies = ['Monochromatic', 'Complementary', 'Analogous', 'Triadic', 'Split-Complementary', 'Tetradic'];
let currentHarmony = 'Complementary';
let selectedHue = 0;
let selectedSat = 100;
let selectedLight = 50;

// Build harmony buttons
harmonies.forEach(h => {
  const btn = document.createElement('button');
  btn.className = 'harmony-btn' + (h === currentHarmony ? ' active' : '');
  btn.textContent = h;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.harmony-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentHarmony = h;
    updatePalette();
  });
  harmonySelector.appendChild(btn);
});

// Draw color wheel
function drawColorWheel() {
  const ctx = colorWheelCanvas.getContext('2d');
  const cx = 110, cy = 110, r = 105;
  for (let angle = 0; angle < 360; angle++) {
    const startAngle = (angle - 1) * Math.PI / 180;
    const endAngle = (angle + 1) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, `hsl(${angle}, 10%, 95%)`);
    grad.addColorStop(0.5, `hsl(${angle}, 80%, 60%)`);
    grad.addColorStop(1, `hsl(${angle}, 100%, 50%)`);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  // Draw selection indicator
  const a = selectedHue * Math.PI / 180;
  const dist = (selectedSat / 100) * r;
  const sx = cx + dist * Math.cos(a);
  const sy = cy + dist * Math.sin(a);
  ctx.beginPath();
  ctx.arc(sx, sy, 7, 0, Math.PI * 2);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(sx, sy, 7, 0, Math.PI * 2);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// Draw saturation-lightness picker
function drawSLPicker() {
  const ctx = slPickerCanvas.getContext('2d');
  const w = 260, h = 140;
  for (let x = 0; x < w; x++) {
    for (let y = 0; y < h; y++) {
      const s = (x / w) * 100;
      const l = 100 - (y / h) * 100;
      ctx.fillStyle = `hsl(${selectedHue}, ${s}%, ${l}%)`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  // Draw crosshair
  const cx = (selectedSat / 100) * w;
  const cy = ((100 - selectedLight) / 100) * h;
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.stroke();
}

colorWheelCanvas.addEventListener('click', (e) => {
  const rect = colorWheelCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left - 110;
  const y = e.clientY - rect.top - 110;
  selectedHue = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
  const dist = Math.min(Math.sqrt(x * x + y * y), 105);
  selectedSat = Math.round((dist / 105) * 100);
  drawColorWheel();
  drawSLPicker();
  updatePalette();
});

slPickerCanvas.addEventListener('click', (e) => {
  const rect = slPickerCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  selectedSat = Math.round((x / 260) * 100);
  selectedLight = Math.round(100 - (y / 140) * 100);
  drawSLPicker();
  drawColorWheel();
  updatePalette();
});

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function getHarmonyColors(h, s, l, mode) {
  switch (mode) {
    case 'Monochromatic':
      return [
        [h, s, Math.min(l + 30, 95)],
        [h, s, Math.min(l + 15, 85)],
        [h, s, l],
        [h, s, Math.max(l - 15, 15)],
        [h, s, Math.max(l - 30, 5)]
      ];
    case 'Complementary':
      return [[h, s, l], [(h + 180) % 360, s, l]];
    case 'Analogous':
      return [[(h - 30 + 360) % 360, s, l], [h, s, l], [(h + 30) % 360, s, l]];
    case 'Triadic':
      return [[h, s, l], [(h + 120) % 360, s, l], [(h + 240) % 360, s, l]];
    case 'Split-Complementary':
      return [[h, s, l], [(h + 150) % 360, s, l], [(h + 210) % 360, s, l]];
    case 'Tetradic':
      return [[h, s, l], [(h + 90) % 360, s, l], [(h + 180) % 360, s, l], [(h + 270) % 360, s, l]];
    default:
      return [[h, s, l]];
  }
}

function updatePalette() {
  const colors = getHarmonyColors(selectedHue, selectedSat, selectedLight, currentHarmony);
  paletteOutput.innerHTML = '';
  colors.forEach(([h, s, l]) => {
    const hex = hslToHex(h, s, l);
    const swatch = document.createElement('div');
    swatch.className = 'palette-swatch';
    swatch.innerHTML = `
      <div class="swatch-color" style="background:${hex}"></div>
      <span class="swatch-hex">${hex}</span>
      <span class="copied-label"></span>
    `;
    swatch.addEventListener('click', () => {
      navigator.clipboard.writeText(hex).then(() => {
        swatch.querySelector('.copied-label').textContent = 'Copied!';
        setTimeout(() => { swatch.querySelector('.copied-label').textContent = ''; }, 1200);
      });
    });
    paletteOutput.appendChild(swatch);
  });
}

function openColorPicker() {
  colorPickerOverlay.classList.add('open');
  drawColorWheel();
  drawSLPicker();
  updatePalette();
}

colorPickerClose.addEventListener('click', () => colorPickerOverlay.classList.remove('open'));
colorPickerOverlay.addEventListener('click', (e) => {
  if (e.target === colorPickerOverlay) colorPickerOverlay.classList.remove('open');
});

</script>
